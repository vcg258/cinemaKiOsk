spring.application.name=cinemaKiOsk

# \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uAD00\uB828 \uC124\uC815
#spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/cinema_kiosk
spring.datasource.username=task_master
spring.datasource.password=4444

# log4j2 \uC124\uC815
logging.level.org.springframework=info
logging.level.com.example.cinemakiosk=debug
# logging pattern
logging.pattern.console=%clr(%-5level){green} %clr(%logger{36}.%M\\(\\)){cyan}: %msg%n

# jpa config
spring.jpa.hibernate.ddl-auto=update
## \uCFFC\uB9AC\uBB38 \uBCF4\uC5EC\uC8FC\uB294 \uC124\uC815
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# mybatis
# \uB9E4\uD37C \uD30C\uC77C\uC758 \uC704\uCE58 (resources/mapper \uD3F4\uB354 \uB0B4\uC758 \uBAA8\uB4E0 xml \uC778\uC2DD)
mybatis.mapper-locations=classpath:mapper/**/*.xml
# \uCE74\uBA5C \uCF00\uC774\uC2A4 \uC790\uB3D9 \uB9E4\uD551
mybatis.configuration.map-underscore-to-camel-case=true

