<!DOCTYPE html>
<!--
  preview-list.html
  UC-01 상영작 목록 페이지 독립 프리뷰 (서버 없이 브라우저에서 바로 열기 가능)
  경로: src/main/resources/static/preview-list.html
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UC-01 프리뷰 | CineOS</title>

  <link rel="stylesheet" href="./css/fonts.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/movie.css">
</head>

<body>

  <!-- ══ HEADER ══════════════════════════════════════════════ -->
  <header class="site-header">
    <div class="site-header__inner">
      <a href="#" class="site-header__logo-link" aria-label="CineOS 홈">
        <img src="./images/logo_cineos.svg" alt="CineOS" class="site-header__logo"
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span style="display:none;font-size:1.3rem;font-weight:800;color:var(--color-brand-400)">CineOS</span>
      </a>
      <nav class="site-nav" aria-label="주요 메뉴">
        <ul class="nav-tab-list">
          <li class="nav-tab-list__item">
            <a href="#" class="nav-tab nav-tab--active">현재 상영작</a>
          </li>
        </ul>
      </nav>
      <a href="#" class="admin-access-btn" aria-label="관리자 로그인">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- ══ MAIN ════════════════════════════════════════════════ -->
  <main class="site-main">

    <!-- 페이지 헤더 -->
    <div class="page-header">
      <h1 class="page-title">영화</h1>
    </div>

    <!-- 탭 -->
    <div class="movie-tabs" role="tablist">
      <button type="button" id="tab-now"
              class="movie-tab movie-tab--active"
              role="tab" aria-selected="true" data-tab="now">
        현재 상영 중
      </button>
      <button type="button" id="tab-upcoming"
              class="movie-tab"
              role="tab" aria-selected="false" data-tab="upcoming">
        상영 예정
      </button>
    </div>

    <!-- 필터 바 -->
    <section class="filter-bar">

      <!-- 장르 -->
      <div class="filter-row">
        <span class="filter-label">장르</span>
        <div class="filter-chip-group" id="filter-genre"></div>
      </div>

      <!-- 등급 -->
      <div class="filter-row">
        <span class="filter-label">등급</span>
        <div class="filter-chip-group" id="filter-rating"></div>
      </div>

      <!-- 상영관 -->
      <div class="filter-row">
        <span class="filter-label">상영관</span>
        <div class="filter-chip-group" id="filter-theater"></div>
      </div>

      <!-- 검색 -->
      <div class="filter-row filter-row--search">
        <span class="filter-label">검색</span>
        <div class="search-wrap">
          <input type="search" id="search-input" class="search-input"
                 placeholder="영화 제목을 입력하세요" autocomplete="off">
          <button type="button" class="search-clear-btn" id="search-clear-btn" hidden>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
        <button type="button" class="btn btn--primary btn--sm" id="search-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="margin-right:4px">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          검색
        </button>
      </div>

    </section>

    <!-- 결과 영역 -->
    <section id="movie-grid-panel" role="tabpanel" aria-labelledby="tab-now" aria-live="polite">

      <!-- 로딩 -->
      <div class="status-area" id="movie-loading" hidden>
        <div class="spinner"></div>
        <p class="status-area__text">영화 목록을 불러오는 중...</p>
      </div>

      <!-- 빈 결과 -->
      <div class="status-area movie-empty" id="movie-empty" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
          <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
        </svg>
        <p id="movie-empty-text" class="status-area__text">해당 조건의 상영작이 없습니다.</p>
        <button type="button" class="btn btn--ghost btn--sm" onclick="resetFilters()">필터 초기화</button>
      </div>

      <!-- 카드 그리드 -->
      <ul class="movie-grid" id="movie-grid"></ul>

    </section>

  </main>

  <!-- ══ FOOTER ══════════════════════════════════════════════ -->
  <footer class="site-footer">
    <a href="#" class="footer-home-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      <span>처음으로</span>
    </a>
    <div class="footer-clock"><time id="footer-time">00:00</time></div>
  </footer>

  <!-- 모달 -->
  <div id="modal-container" class="modal-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal" role="document">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title"></h2>
        <button type="button" class="modal__close-btn" id="modal-close-btn" aria-label="모달 닫기">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      <div class="modal__body" id="modal-body"></div>
      <div class="modal__footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- 알림 -->
  <div id="alert-container" class="alert-container" aria-live="polite" role="status"></div>

  <!-- ══ 공용 JS ══════════════════════════════════════════════ -->
  <script src="./js/common.js"></script>

  <!-- ══ 프리뷰 전용 스크립트 ════════════════════════════════ -->
  <script>
    /* ─────────────────────────────────────────────────────────
       목 데이터 — 실제 API 대신 사용하는 가짜 영화 목록
    ───────────────────────────────────────────────────────── */
    const MOCK_MOVIES = [
      { movieId: 1, title: '범죄도시 4',           genre: '액션',       rating: '15', runtime: 109, soldOut: false },
      { movieId: 2, title: '인사이드 아웃 2',       genre: '애니메이션', rating: 'ALL', runtime: 100, soldOut: false },
      { movieId: 3, title: '파묘',                 genre: '공포',       rating: '15', runtime: 134, soldOut: true  },
      { movieId: 4, title: '서울의 봄',             genre: '드라마',     rating: '12', runtime: 141, soldOut: false },
      { movieId: 5, title: '위키드',               genre: '로맨스',     rating: '12', runtime: 160, soldOut: false },
      { movieId: 6, title: '베놈: 라스트 댄스',     genre: 'SF',         rating: '12', runtime: 109, soldOut: false },
      { movieId: 7, title: '글래디에이터 2',        genre: '액션',       rating: '15', runtime: 148, soldOut: false },
      { movieId: 8, title: '모아나 2',              genre: '애니메이션', rating: 'ALL', runtime:  100, soldOut: false },
    ];

    const MOCK_UPCOMING = [
      { movieId: 9,  title: '미키 17',              genre: 'SF',         rating: '12', runtime: 137, soldOut: false },
      { movieId: 10, title: '캡틴 아메리카: 브레이브 뉴 월드', genre: '액션', rating: '12', runtime: 118, soldOut: false },
    ];

    /* ─────────────────────────────────────────────────────────
       필터 옵션
    ───────────────────────────────────────────────────────── */
    const GENRE_OPTIONS   = [
      { label: '전체', value: null },
      { label: '액션', value: '액션' },
      { label: '드라마', value: '드라마' },
      { label: '로맨스', value: '로맨스' },
      { label: '코미디', value: '코미디' },
      { label: '공포', value: '공포' },
      { label: 'SF', value: 'SF' },
      { label: '애니메이션', value: '애니메이션' },
    ];

    const RATING_OPTIONS  = [
      { label: '전체',       value: null  },
      { label: '전체관람가', value: 'ALL' },
      { label: '12세',       value: '12'  },
      { label: '15세',       value: '15'  },
      { label: '청소년관람불가', value: '19' },
    ];

    const THEATER_OPTIONS = [
      { label: '전체',   value: null       },
      { label: '일반관', value: 'STANDARD' },
      { label: 'IMAX',   value: 'IMAX'     },
      { label: '4DX',    value: '4DX'      },
    ];

    const RATING_BADGE = {
      'ALL': { cls: 'badge--all', text: '전체관람가' },
      '12':  { cls: 'badge--12',  text: '12세'       },
      '15':  { cls: 'badge--15',  text: '15세'       },
      '19':  { cls: 'badge--18',  text: '청소년불가'  },
    };

    /* ─────────────────────────────────────────────────────────
       상태
    ───────────────────────────────────────────────────────── */
    let state = { tab: 'now', genre: null, rating: null, theater: null, keyword: '' };

    /* ─────────────────────────────────────────────────────────
       필터 칩 렌더링
    ───────────────────────────────────────────────────────── */
    function renderChips(containerId, options, stateKey) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      options.forEach(({ label, value }) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'filter-chip' + (state[stateKey] === value ? ' filter-chip--active' : '');
        btn.textContent = label;
        btn.addEventListener('click', () => {
          state[stateKey] = value;
          renderChips(containerId, options, stateKey);
          renderMovies();
        });
        container.appendChild(btn);
      });
    }

    /* ─────────────────────────────────────────────────────────
       카드 HTML 생성
    ───────────────────────────────────────────────────────── */
    function makeCard(m) {
      const badge      = RATING_BADGE[m.rating] || {};
      const runtime    = m.runtime >= 60
        ? `${Math.floor(m.runtime / 60)}시간 ${m.runtime % 60 ? m.runtime % 60 + '분' : ''}`
        : `${m.runtime}분`;
      const soldOutHtml = m.soldOut
        ? `<div class="card__sold-out-overlay"><span class="card__sold-out-label">매진</span></div>`
        : '';

      return `
        <li>
          <article class="card card--clickable" tabindex="0"
            onclick="CineOS.alert.show('${m.title} 상세 페이지로 이동합니다.', 'info')">
            <div class="card__img-wrap">
              <img class="card__img"
                   src="./images/placeholder-poster.jpg"
                   alt="${m.title} 포스터"
                   loading="lazy">
              ${soldOutHtml}
            </div>
            <div class="card__body">
              <h2 class="card__title">${m.title}</h2>
              <div class="card__meta">
                ${badge.cls ? `<span class="badge ${badge.cls}">${badge.text}</span>` : ''}
                <span>${m.genre}</span>
              </div>
              <p class="card__runtime">${runtime}</p>
            </div>
          </article>
        </li>`;
    }

    /* ─────────────────────────────────────────────────────────
       목록 렌더링 (필터·검색 적용)
    ───────────────────────────────────────────────────────── */
    function renderMovies() {
      const grid    = document.getElementById('movie-grid');
      const empty   = document.getElementById('movie-empty');
      const loading = document.getElementById('movie-loading');

      // 로딩 연출
      loading.hidden = false;
      grid.hidden    = true;
      empty.hidden   = true;

      setTimeout(() => {
        let movies = state.tab === 'now' ? [...MOCK_MOVIES] : [...MOCK_UPCOMING];

        // 필터 적용
        if (state.genre)   movies = movies.filter(m => m.genre === state.genre);
        if (state.rating)  movies = movies.filter(m => m.rating === state.rating);
        // theaterType은 mock 데이터에 없으므로 skip

        // 키워드 검색
        const kw = state.keyword.trim().toLowerCase();
        if (kw) movies = movies.filter(m => m.title.toLowerCase().includes(kw));

        loading.hidden = true;

        if (movies.length === 0) {
          document.getElementById('movie-empty-text').textContent =
            state.tab === 'now' ? '현재 상영 중인 영화가 없습니다.' : '상영 예정 영화가 없습니다.';
          empty.hidden = false;
          grid.hidden  = true;
        } else {
          grid.innerHTML = movies.map(makeCard).join('');
          grid.hidden    = false;
          empty.hidden   = true;
        }
      }, 400); // 로딩 연출을 위한 딜레이
    }

    /* ─────────────────────────────────────────────────────────
       필터 초기화
    ───────────────────────────────────────────────────────── */
    function resetFilters() {
      state.genre   = null;
      state.rating  = null;
      state.theater = null;
      state.keyword = '';
      document.getElementById('search-input').value = '';
      document.getElementById('search-clear-btn').hidden = true;
      renderChips('filter-genre',   GENRE_OPTIONS,   'genre');
      renderChips('filter-rating',  RATING_OPTIONS,  'rating');
      renderChips('filter-theater', THEATER_OPTIONS, 'theater');
      renderMovies();
    }

    /* ─────────────────────────────────────────────────────────
       초기화
    ───────────────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {

      // 탭
      document.getElementById('tab-now').addEventListener('click', () => {
        if (state.tab === 'now') return;
        state.tab = 'now';
        document.getElementById('tab-now').classList.add('movie-tab--active');
        document.getElementById('tab-now').setAttribute('aria-selected', 'true');
        document.getElementById('tab-upcoming').classList.remove('movie-tab--active');
        document.getElementById('tab-upcoming').setAttribute('aria-selected', 'false');
        renderMovies();
      });

      document.getElementById('tab-upcoming').addEventListener('click', () => {
        if (state.tab === 'upcoming') return;
        state.tab = 'upcoming';
        document.getElementById('tab-upcoming').classList.add('movie-tab--active');
        document.getElementById('tab-upcoming').setAttribute('aria-selected', 'true');
        document.getElementById('tab-now').classList.remove('movie-tab--active');
        document.getElementById('tab-now').setAttribute('aria-selected', 'false');
        renderMovies();
      });

      // 검색
      const searchInput    = document.getElementById('search-input');
      const searchClearBtn = document.getElementById('search-clear-btn');

      searchInput.addEventListener('input', () => {
        searchClearBtn.hidden = searchInput.value.trim() === '';
      });

      searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') { state.keyword = searchInput.value; renderMovies(); }
      });

      document.getElementById('search-btn').addEventListener('click', () => {
        state.keyword = searchInput.value;
        renderMovies();
      });

      searchClearBtn.addEventListener('click', () => {
        searchInput.value = '';
        searchClearBtn.hidden = true;
        state.keyword = '';
        renderMovies();
        searchInput.focus();
      });

      // 필터 칩 초기 렌더
      renderChips('filter-genre',   GENRE_OPTIONS,   'genre');
      renderChips('filter-rating',  RATING_OPTIONS,  'rating');
      renderChips('filter-theater', THEATER_OPTIONS, 'theater');

      // 초기 목록 로드
      renderMovies();

      // 푸터 시계
      (function clock() {
        const now = new Date();
        document.getElementById('footer-time').textContent =
          `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      })();
    });
  </script>

</body>
</html>
