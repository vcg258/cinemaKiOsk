<!DOCTYPE html>
<!--
  templates/mypage/lookup.html
  ─────────────────────────────────────────────────────────────────────────
  UC-08: 예매 조회 — 예매번호 입력 화면 (고객용)
  ※ 개인정보 보호로 인해 휴대폰 번호 대신 예매번호로 조회 방식 변경

  ▶ 기능 요약
    - 예매번호 입력 후 예매 내역 조회
    - 조회 성공: 즉시 booking-detail.html 로 이동
    - 예매 없음: "예매 내역을 찾을 수 없습니다." 후 5초 뒤 메인으로

  ▶ Controller → View 전달 Model 속성
    - 없음 (입력 화면 — 조회는 JS fetch 로 처리)

  ▶ 연결 UC
    → booking-detail: 조회 성공 시 /mypage/booking/{reservationId} 로 이동

  ▶ 파일 위치
    templates/mypage/lookup.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{})}">

<head>
  <title>예매 조회 | CineOS</title>
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       TODO: UC-08 예매 조회 콘텐츠 구현
       ─────────────────────────────────────────────────────────────────
       구현 항목:
         [ ] 페이지 제목 + 안내 문구 ("예매번호를 입력해 주세요.")
         [ ] 예매번호 입력 필드
               ReservationDetailsVO.id 가 String(UUID) 타입이므로 text 입력
               형식 검증: 빈 값 체크
         [ ] '조회' 버튼 → GET /api/mypage/lookup?reservationId={id}
               응답 처리:
                 성공 → /mypage/booking/{reservationId} 로 이동
                 없음 → "예매 내역을 찾을 수 없습니다." + 5초 후 메인 이동
  ══════════════════════════════════════════════════════════════════ -->
  <div class="mypage-placeholder">
    <p>UC-08 예매 조회 — 구현 예정</p>
  </div>

  <!-- 페이지 전용 JS -->
  <script th:src="@{/js/mypage/lookup.js}" th:if="${false}"></script>

</main>
</body>
</html>
