<!DOCTYPE html>
<!--
  templates/mypage/booking-detail.html
  ─────────────────────────────────────────────────────────────────────────
  UC-08: 예매 조회 — 예매 상세 + 출력·취소 화면 (고객용)

  ▶ 기능 요약
    - 예매 상세 정보 표시
    - '출력' 선택 시 티켓 인쇄 + 예매 확정
    - '취소' 선택 시 자동 환불 처리

  ▶ Controller → View 전달 Model 속성
    - reservation : ReservationDetailsDTO  예매 상세 정보
                    └ id, scheduleId, reservationTime, seatNumber(List)
                    ※ phone 필드는 표시하지 않음 (개인정보 보호)
    - payment     : PaymentDetailsDTO      결제 정보
                    └ id, reservationId, cost, time, status, usePoint
    - movie       : MovieDTO               영화 정보 (schedule → movie 조인)
    - schedule    : ScheduleDTO            상영 스케줄 정보

  ▶ 연결 UC
    ← UC-08 lookup: 예매 선택 후 진입
    → '출력': 티켓 인쇄
    → '취소': DELETE /api/reservation/{id} → 환불 처리

  ▶ 파일 위치
    templates/mypage/booking-detail.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{})}">

<head>
  <title>예매 상세 | CineOS</title>
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       TODO: UC-08 예매 상세 구현
       ─────────────────────────────────────────────────────────────────
       구현 항목:
         [ ] 예매 번호:  th:text="${reservation.id}"
         [ ] 영화명:     th:text="${movie.title}"
         [ ] 상영 일시:  th:text="${schedule.startTime}"
         [ ] 상영관:     th:text="${schedule.no} + '관'"
         [ ] 좌석 목록:  th:each="seat : ${reservation.seatNumber}"
         [ ] 결제 금액:  th:text="${payment.cost}"
         [ ] 결제 상태:  th:text="${payment.status}"  (PAY / RETURN / FAIL)
         [ ] '티켓 출력' 버튼 → window.print() 또는 출력 전용 URL
         [ ] '예매 취소' 버튼 → DELETE /api/reservation/{id}
               확인 모달 띄운 후 진행
         [ ] '뒤로가기' → /mypage/lookup
  ══════════════════════════════════════════════════════════════════ -->
  <div class="mypage-placeholder">
    <p>UC-08 예매 상세 — 구현 예정</p>
    <a th:href="@{/mypage/lookup}" class="btn btn--ghost">← 뒤로</a>
  </div>

  <!-- 페이지 전용 JS -->
  <script th:src="@{/js/mypage/lookup.js}" th:if="${false}"></script>

</main>
</body>
</html>
