<!DOCTYPE html>
<!--
  templates/error/404.html
  ─────────────────────────────────────────────────────────────────────────
  404 Not Found 에러 페이지
  Spring Boot 에러 페이지 자동 매핑: /error/404.html

  ▶ 파일 위치
    templates/error/404.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::link})}">

<head>
  <meta charset="UTF-8">
  <title>페이지를 찾을 수 없습니다 | CineOS</title>
</head>

<body>
<main>
  <div class="error-page">
    <h1 class="error-page__code">404</h1>
    <p class="error-page__message">페이지를 찾을 수 없습니다.</p>
    <a th:href="@{/}" class="btn btn--primary">처음으로 돌아가기</a>
  </div>
</main>
</body>
</html>
