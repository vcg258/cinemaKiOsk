<!DOCTYPE html>
<!--
  home.html — 키오스크 홈(스플래시) 화면
  경로     : templates/home.html
  매핑 URL : GET /
  ─────────────────────────────────────────────────────────────────────────
  ▶ 동작
    · 상영 중 + 상영 예정 영화를 풀스크린 슬라이드쇼로 표시 (5초 자동 전환)
    · 화면 어디든 터치 → /movie/list 이동
    · 우하단 [관리] 버튼 5회 연속 탭 → /admin/login 이동
      (탭 간격이 3초를 초과하면 카운터 자동 리셋)

  ▶ 주의
    · base.html 레이아웃을 사용하지 않는 완전 독립 화면
    · 컨트롤러에서 List<MovieDTO> movies 를 모델에 담아 전달해야 함
      (없으면 빈 화면 + 터치 시 /movie/list 이동은 정상 동작)
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
  <meta charset="UTF-8">
  <!-- user-scalable=no: 키오스크에서 핀치줌 방지 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CineOS</title>

  <!-- 웹폰트 -->
  <link rel="stylesheet" th:href="@{/css/fonts.css}">
  <!-- 디자인 토큰 (CSS 변수) -->
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <!-- 홈 화면 전용 스타일 -->
  <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body class="home-body">

  <!-- ────────────────────────────────────────────────────────────────
       로고 (좌상단 고정)
       pointer-events: none — 클릭 시 body의 touch 핸들러에 위임
  ──────────────────────────────────────────────────────────────────── -->
  <div class="home-logo" aria-hidden="true">
    <img th:src="@{/images/logo_cineos.svg}"
         src="/images/logo_cineos.svg"
         alt="CineOS"
         class="home-logo__img"
         onerror="this.style.visibility='hidden'">
  </div>

  <!-- ────────────────────────────────────────────────────────────────
       슬라이드쇼 (상영 중 + 상영 예정 영화 목록)
       movies 가 비어있으면 빈 상태 UI(slideshow--empty) 표시
  ──────────────────────────────────────────────────────────────────── -->

  <!-- 영화 목록이 있을 때 -->
  <div class="slideshow"
       id="slideshow"
       th:if="${movies != null and !movies.isEmpty()}"
       aria-label="상영 영화 슬라이드쇼"
       aria-live="polite">

    <!-- 슬라이드 반복 렌더링 -->
    <!--
      stat.index: 0-based 인덱스 (JS가 data-index로 추적)
      stat.first: 첫 번째 슬라이드에만 slide--active 추가 (초기 화면)
    -->
    <div class="slide"
         th:each="movie, stat : ${movies}"
         th:attr="data-index=${stat.index}"
         th:classappend="${stat.first} ? ' slide--active' : ''">

      <!-- 배경 컨테이너 (포스터 이미지 or CSS 그라디언트 fallback) -->
      <div class="slide__bg">
        <!--
          포스터 이미지:
          onerror="this.style.display='none'" → 로드 실패 시 CSS 그라디언트가 그대로 보임
        -->
        <img class="slide__poster"
             th:src="${movie.posterUrl}"
             alt=""
             aria-hidden="true"
             onerror="this.style.display='none'">
      </div>

      <!-- 하단 그라디언트 딤 오버레이 (텍스트 가독성) -->
      <div class="slide__overlay" aria-hidden="true"></div>

      <!-- 영화 정보 -->
      <div class="slide__content">

        <!-- 관람 등급 배지 -->
        <!--
          th:text: ALL → "전체관람가", 그 외 → "12세", "15세", "19세"
          th:classappend: 등급에 따라 CSS 색상 변경
        -->
        <span class="rating-badge"
              th:classappend="'rating-badge--' + ${#strings.toLowerCase(movie.rating)}"
              th:text="${movie.rating == 'ALL'} ? '전체관람가' :
                        ${movie.rating} + '세 이상'">
          15세 이상
        </span>

        <!-- 영화 제목 -->
        <h1 class="slide__title" th:text="${movie.title}">영화 제목</h1>

        <!-- 장르 -->
        <p class="slide__genre" th:text="${movie.genre}">액션 / 드라마</p>

        <!-- 상영 기간 or 개봉 예정일 -->
        <!--
          endAt이 null이면 "YYYY-MM-DD 개봉 예정"
          endAt이 있으면 "YYYY-MM-DD ~ YYYY-MM-DD"
        -->
        <p class="slide__period">
          <th:block th:if="${movie.endAt == null}">
            <th:block th:text="${movie.startAt}">2026-04-15</th:block> 개봉 예정
          </th:block>
          <th:block th:unless="${movie.endAt == null}">
            <th:block th:text="${movie.startAt}">2026-03-12</th:block>
            &nbsp;~&nbsp;
            <th:block th:text="${movie.endAt}">2026-05-11</th:block>
          </th:block>
        </p>

        <!-- 터치 유도 문구 -->
        <p class="slide__cta" aria-hidden="true">화면을 터치하여 예매하기</p>

      </div><!-- /.slide__content -->
    </div><!-- /.slide (th:each 끝) -->

    <!-- ── 슬라이드 인디케이터 (하단 점) ──────────────── -->
    <!--
      JS: goToSlide() 호출 시 indicator--active 클래스를 옮겨 다니며 동기화
      aria-hidden: 스크린 리더에게 불필요한 요소
    -->
    <div class="slide-indicators" id="slide-indicators" aria-hidden="true">
      <span class="indicator"
            th:each="movie, stat : ${movies}"
            th:attr="data-index=${stat.index}"
            th:classappend="${stat.first} ? ' indicator--active' : ''">
      </span>
    </div>

  </div><!-- /.slideshow -->

  <!-- 영화 목록이 없을 때 빈 상태 UI -->
  <div class="slideshow slideshow--empty"
       th:unless="${movies != null and !movies.isEmpty()}"
       role="status"
       aria-live="polite">
    <p class="empty-title">CineOS</p>
    <p class="empty-sub">현재 등록된 상영 영화가 없습니다.</p>
    <p class="slide__cta" style="margin-top: 8px;">화면을 터치하면 상영 목록으로 이동합니다.</p>
  </div>


  <!-- ────────────────────────────────────────────────────────────────
       관리자 접근 버튼 (우하단 고정)

       동작:
         · 5회 연속 탭 → /admin/login 이동
         · 탭 간격 3초 초과 시 카운터 자동 리셋
         · e.stopPropagation() → 화면 전체 터치 핸들러 차단

       디자인:
         · 기존의 작은 자물쇠 아이콘 대신 직사각형 면 버튼 (터치 편의성)
         · 도트 5개로 현재 탭 카운트를 시각적으로 피드백
  ──────────────────────────────────────────────────────────────────── -->
  <button class="admin-btn"
          id="admin-btn"
          type="button"
          aria-hidden="true"
          tabindex="-1">

    <!-- 탭 카운트 피드백 도트 (5개 고정) -->
    <!--
      JS의 updateDots(count) 함수가
      admin-btn__dot--filled 클래스를 순서대로 채워 나감
    -->
    <span class="admin-btn__dots" id="admin-btn-dots" aria-hidden="true">
      <i class="admin-btn__dot"></i>
      <i class="admin-btn__dot"></i>
      <i class="admin-btn__dot"></i>
      <i class="admin-btn__dot"></i>
      <i class="admin-btn__dot"></i>
    </span>

    <!-- 버튼 레이블 -->
    <span class="admin-btn__label">관리</span>

  </button>


  <!-- ────────────────────────────────────────────────────────────────
       스크립트
  ──────────────────────────────────────────────────────────────────── -->

  <!-- 홈 화면 전용 JS -->
  <script th:src="@{/js/home.js}"></script>

</body>
</html>
