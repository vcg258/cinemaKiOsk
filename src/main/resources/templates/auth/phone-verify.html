<!DOCTYPE html>
<!--
  templates/auth/phone-verify.html
  ─────────────────────────────────────────────────────────────────────────
  UC-05: 휴대폰 인증 팝업 (고객용)

  ▶ 사용 방식
    이 파일은 단독 페이지보다는 결제 화면(payment.html)에서
    공용 모달(fragments/modal.html)을 통해 콘텐츠로 삽입되는 방식을 권장.
    단독 라우팅이 필요한 경우 이 파일을 직접 렌더링.

  ▶ 기능 요약
    - 휴대폰 번호 입력 → 회원 정보 조회 → 인증 완료
    - 인증 완료 시 결제 화면 포인트 UI 활성화

  ▶ Controller → View 전달 Model 속성
    - 없음 (번호 입력 후 JS fetch로 POST /api/auth/phone)

  ▶ 에러 메시지 (명세 기준 — 임의 변경 금지)
    - 미등록 번호: "등록되지 않은 번호입니다."
    - 형식 오류:   "올바른 휴대폰 번호 형식으로 입력해 주세요."

  ▶ 파일 위치
    templates/auth/phone-verify.html
  ─────────────────────────────────────────────────────────────────────────
-->

<main>
