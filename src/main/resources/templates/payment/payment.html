<!DOCTYPE html>
<!--
  templates/payment/payment.html
  ─────────────────────────────────────────────────────────────────────────
  UC-04 결제 처리 / UC-05 휴대폰 인증 / UC-06 포인트 사용 (고객용)

  ▶ 기능 요약
    - 임시 점유 타이머 10분 카운트다운 (만료 시 UC-03 재시작)
    - 예매 정보 요약 (영화·날짜·시간·상영관·좌석·인원)
    - 할인 정책 선택 (SSR 목록 → JS 금액 계산)
    - 포인트 사용 (UC-05 인증 → UC-06 사용 / 전액 사용 시 결제 수단 생략)
    - 최종 결제 금액 실시간 계산 표시
    - 결제 수단 선택 (신용카드·현금·간편결제)
    - '결제하기' → POST /api/payment → UC-07 결과 화면으로 이동

  ▶ Controller → View 전달 Model 속성
    - movie            : MovieDTO              영화 정보 요약
                         └ movieId, title, rating
    - schedule         : ScheduleDTO           선택된 상영 스케줄
                         └ id, no, startTime, endTime
    - theater          : TheaterDTO            상영관 정보
                         └ no, name, cost
    - reservation      : ReservationDetailsDTO 예매 내역 (좌석 포함)
                         └ id, scheduleId, phone, reservationTime, seatNumber(List)
    - discountPolicies : List<DiscountPolicyDTO> 적용 가능한 할인 정책 목록
                         └ id, policyName, discountType(RATIO/WON), discountValue,
                           conditionType(TIME/AGE/JOB)
    - bonusPolicies    : List<BonusPolicyDTO>   적립 정책 목록
                         └ id, policyName, giveValue(적립 비율 %)
    - adultCount       : Integer               성인 인원 수
    - teenCount        : Integer               청소년 인원 수
    - member           : MembersDTO            포인트 인증 완료 후 세션에서 주입
                         └ phone, point  (인증 전: null)

  ▶ 연결 UC
    ← UC-03 seat: 좌석 선택 완료 후 진입
      (?scheduleId=&adultCount=&teenCount=&seatIds=)
    ↔ UC-05: 포인트 버튼 클릭 시 phoneVerifyModal 팝업
    ↔ UC-06: 인증 완료 후 포인트 사용 UI 활성화
    → UC-07: 결제 성공 시 /payment/result?reservationId= 으로 이동

  ▶ 파일 위치
    templates/payment/payment.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::link})}">

<head>
  <title>결제 | CineOS</title>
  <!-- 결제 단계 전용 CSS -->
  <link rel="stylesheet" th:href="@{/css/payment.css}">
</head>

<body>
<main class="payment-main">

  <!-- ══════════════════════════════════════════════════════════════════
       예매 단계 표시기 (3단계: 결제 — 최종)
       1단계(날짜·시간), 2단계(좌석)는 완료 상태
  ══════════════════════════════════════════════════════════════════ -->
  <ol class="steps" aria-label="예매 단계">
    <li class="steps__item steps__item--done">
      <span class="steps__num" aria-hidden="true">✓</span>
      <span class="steps__label">날짜·시간</span>
    </li>
    <li class="steps__item steps__item--done">
      <span class="steps__num" aria-hidden="true">✓</span>
      <span class="steps__label">좌석</span>
    </li>
    <li class="steps__item steps__item--active" aria-current="step">
      <span class="steps__num">3</span>
      <span class="steps__label">결제</span>
    </li>
  </ol>


  <!-- ══════════════════════════════════════════════════════════════════
       임시 점유 타이머 (10분 카운트다운)
       seat.js에서 임시 점유한 좌석의 유지 제한 시간.
       만료 시 "시간 초과로 예매가 취소되었습니다." → /movie/list 이동
  ══════════════════════════════════════════════════════════════════ -->
  <div class="payment-timer" id="payment-timer"
       role="timer" aria-live="polite" aria-label="좌석 임시 점유 잔여 시간">

    <div class="payment-timer__left">
      <!-- 시계 아이콘 -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
           width="18" height="18" aria-hidden="true" class="payment-timer__icon">
        <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22
                 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8
                 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
      </svg>
      <span class="payment-timer__label">좌석 임시 점유 시간</span>
    </div>

    <!-- 남은 시간 (JS에서 MM:SS 형식으로 갱신) -->
    <span class="payment-timer__countdown" id="timer-countdown">10:00</span>

    <!-- 하단 진행 바: width가 100%→0%로 줄어들며 시간 경과 표시 -->
    <div class="payment-timer__bar-wrap" aria-hidden="true">
      <div class="payment-timer__bar" id="timer-bar" style="width: 100%;"></div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════════════════
       예매 정보 요약 (SSR)
       영화 제목·등급 / 상영 일시 / 상영관 / 좌석 / 인원
  ══════════════════════════════════════════════════════════════════ -->
  <section class="payment-section" aria-labelledby="label-booking-info">
    <h2 class="payment-section__title" id="label-booking-info">예매 정보</h2>

    <div class="booking-info-card">

      <!-- 영화 제목 + 관람등급 배지 -->
      <div class="booking-info-card__row booking-info-card__row--title">
        <span class="booking-info-card__movie-title"
              th:text="${movie != null ? movie.title : '-'}">영화 제목</span>
        <span class="badge badge--sm"
              th:classappend="${movie.rating == 'ALL'     ? 'badge--all' :
                               movie.rating == '12'      ? 'badge--12'  :
                               movie.rating == 'TWELVE'  ? 'badge--12'  :
                               movie.rating == '15'      ? 'badge--15'  :
                               movie.rating == 'FIFTEEN' ? 'badge--15'  :
                               movie.rating == '19'      ? 'badge--18'  :
                               movie.rating == 'NINETEEN'? 'badge--18'  : ''}"
              th:text="${movie.rating == 'ALL'      ? '전체관람가'    :
                        movie.rating == '12'        ? '12세'          :
                        movie.rating == 'TWELVE'    ? '12세'          :
                        movie.rating == '15'        ? '15세'          :
                        movie.rating == 'FIFTEEN'   ? '15세'          :
                        movie.rating == '19'        ? '청소년관람불가' :
                        movie.rating == 'NINETEEN'  ? '청소년관람불가' : movie.rating}">
          등급
        </span>
      </div>

      <!-- 상영 일시: JS에서 ISO 8601 → "MM/DD (요일) HH:MM ~ HH:MM" 형식으로 변환 -->
      <div class="booking-info-card__row">
        <span class="booking-info-card__label">상영 일시</span>
        <span class="booking-info-card__value"
              id="booking-datetime"
              th:data-start="${schedule != null ? schedule.startTime : ''}"
              th:data-end="${schedule != null ? schedule.endTime : ''}">
          -
        </span>
      </div>

      <!-- 상영관 번호 -->
      <div class="booking-info-card__row">
        <span class="booking-info-card__label">상영관</span>
        <span class="booking-info-card__value"
              th:text="${schedule != null ? schedule.no + '관' : '-'}">
          -
        </span>
      </div>

      <!-- 좌석 번호 목록 (SSR + JS 보완) -->
      <div class="booking-info-card__row">
        <span class="booking-info-card__label">좌석</span>
        <span class="booking-info-card__value" id="booking-seats">
          <!--
            서버에서 reservation.seatNumber 목록이 있으면 SSR로 렌더링.
            없으면 JS에서 SEAT_NUMBERS 상수를 이용해 표시.
          -->
          <th:block th:if="${reservation != null and not #lists.isEmpty(reservation.seatNumber)}">
            <th:block th:each="seat, stat : ${reservation.seatNumber}">
              <span th:text="${seat}">A1</span><th:block th:if="${!stat.last}">, </th:block>
            </th:block>
          </th:block>
          <th:block th:unless="${reservation != null and not #lists.isEmpty(reservation.seatNumber)}">
            <!-- JS에서 SEAT_NUMBERS로 채움 -->
            -
          </th:block>
        </span>
      </div>

      <!-- 인원 (성인/청소년) -->
      <div class="booking-info-card__row">
        <span class="booking-info-card__label">인원</span>
        <span class="booking-info-card__value">
          성인 <strong th:text="${adultCount != null ? adultCount : 0}">0</strong>명
          <th:block th:if="${teenCount != null and teenCount > 0}">
            · 청소년 <strong th:text="${teenCount}">0</strong>명
          </th:block>
        </span>
      </div>

    </div>
  </section>

<!-- 청소년 할인은 자리 정하기 전에 고객이 선택하고,  -->

<!-- 여기부터 모달창으로 바꾸기.
회원 여부를 먼저 묻고, 입력하면 적립(결제 완료 시) & 쿠폰 및 포인트 사용 여부 묻는 단계 추가 -->

  <!-- ══════════════════════════════════════════════════════════════════
       포인트 사용 (UC-05 인증 → UC-06 사용)

       ① 인증 전 (#point-auth-wrap): 인증 버튼 표시
          클릭 → CineOS.modal.open(phoneVerifyModal) → POST /api/auth/phone
       ② 인증 후 (#point-use-wrap):  잔액 + 입력 + 전액 사용 버튼 표시
          전액 사용 시 최종 결제 금액 0원 → 결제 수단 섹션 자동 숨김

       두 div 모두 항상 DOM에 존재하며 JS가 hidden 속성으로 토글.
       서버에서 member 세션이 있으면 initPage()에서 즉시 인증 완료 상태로 초기화.
  ══════════════════════════════════════════════════════════════════ -->
  <section class="payment-section" aria-labelledby="label-point">
    <h2 class="payment-section__title" id="label-point">포인트 사용</h2>

    <!-- ① 인증 전: 인증 버튼 -->
    <!-- JS initPage()에서 MEMBER_PHONE이 있으면 즉시 hidden 처리 -->
    <div class="point-auth-wrap" id="point-auth-wrap">
      <p class="point-guide">포인트 사용을 위해 휴대폰 번호 인증이 필요합니다. </p>
      <button type="button"
              class="btn btn--secondary"
              id="btn-point-auth"
              aria-haspopup="dialog">
        <!-- 전화기 아이콘 -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="currentColor" width="18" height="18" aria-hidden="true">
          <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36
                   1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1
                   1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0
                   1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
        </svg>
        포인트 인증하기
      </button>
    </div>

    <!-- ② 인증 후: 포인트 잔액·입력 UI -->
    <!-- 초기 hidden; JS에서 인증 성공 시 해제 -->
    <div class="point-use-wrap" id="point-use-wrap" hidden>

      <!-- 보유 포인트 잔액 -->
      <div class="point-balance">
        <span class="point-balance__label">보유 포인트</span>
        <!-- JS에서 인증 후 실제 잔액으로 업데이트 -->
        <span class="point-balance__value" id="point-balance-display">0P</span>
      </div>

      <!-- 포인트 입력 + 전액 사용 버튼 -->
      <div class="point-input-group">
        <div class="point-input-wrap">
          <input type="number"
                 class="form-control"
                 id="point-input"
                 placeholder="사용할 포인트 입력"
                 min="0"
                 step="100"
                 inputmode="numeric"
                 aria-label="사용할 포인트">
          <!-- P 단위 표시 -->
          <span class="point-input-unit" aria-hidden="true">P</span>
        </div>
        <!-- 전액 사용: 보유 포인트를 결제 금액 한도 내에서 전부 사용 -->
        <button type="button"
                class="btn btn--secondary btn--sm"
                id="btn-point-all">
          전액 사용
        </button>
      </div>

      <!-- 포인트 입력 오류 메시지 (한도 초과 등) -->
      <p class="point-error" id="point-error" aria-live="polite" hidden></p>

    </div>
  </section>

<!--결제 금액 섹션이랑 결제 수단 섹션 합치기 css 고려 클래스명이랑 아이디 다시 생각해봐야 함-->
  <!-- ══════════════════════════════════════════════════════════════════
       결제 금액 요약 (실시간 계산)
       기본 요금 - 할인 - 포인트 사용 = 최종 결제 금액
       포인트 적립 예정 금액 안내도 표시 (bonusPolicies 기반)
  ══════════════════════════════════════════════════════════════════ -->
  <section class="payment-section payment-section--price"
           aria-labelledby="label-price">
    <h2 class="payment-section__title" id="label-price">결제 금액</h2>

    <div class="price-breakdown">

      <!-- 기본 요금: 성인·청소년 요금 합계 (JS 계산) -->
      <div class="price-row">
        <span class="price-row__label">기본 요금</span>
        <span class="price-row__value" id="price-base">0원</span>
      </div>

      <!-- 할인 금액 (할인 선택 시에만 표시) -->
      <div class="price-row price-row--deduct" id="price-discount-row" hidden>
        <span class="price-row__label">할인</span>
        <span class="price-row__value price-row__value--deduct" id="price-discount">
          -0원
        </span>
      </div>

      <!-- 포인트 사용 금액 (포인트 입력 시에만 표시) -->
      <div class="price-row price-row--deduct" id="price-point-row" hidden>
        <span class="price-row__label">포인트 사용</span>
        <span class="price-row__value price-row__value--deduct" id="price-point">
          -0P
        </span>
      </div>

      <!-- 구분선 -->
      <div class="price-divider" aria-hidden="true"></div>

      <!-- 총 결제 금액 (가장 강조) -->
      <div class="price-row price-row--total">
        <span class="price-row__label">총 결제 금액</span>
        <strong class="price-row__value price-row__value--total"
                id="price-total">
          0원
        </strong>
      </div>

      <!--
        포인트 적립 예정 안내 (UC-07 미리보기).
        bonusPolicies[0].giveValue % 기준으로 계산.
        총 결제 금액이 0원이거나 적립 정책이 없으면 숨김.
      -->
      <p class="price-bonus-note" id="price-bonus-note" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="currentColor" width="14" height="14" aria-hidden="true">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12
                   2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
        </svg>
        결제 완료 시
        <strong id="price-bonus-amount">0P</strong> 적립 예정
      </p>

    </div>
  </section>


  <!-- ══════════════════════════════════════════════════════════════════
       결제 수단 선택 (UC-04)
       전액 포인트 사용(결제 금액 0원) 시 이 섹션 자동 hidden.
  ══════════════════════════════════════════════════════════════════ -->
  <section class="payment-section"
           id="pay-method-section"
           aria-labelledby="label-pay-method">
    <h2 class="payment-section__title" id="label-pay-method">결제 수단</h2>

    <div class="pay-method-group"
         role="radiogroup"
         aria-labelledby="label-pay-method">

      <!-- 신용카드 -->
      <button type="button"
              class="pay-method-btn"
              data-method="CARD"
              aria-pressed="false">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="currentColor" width="28" height="28"
             aria-hidden="true" class="pay-method-btn__icon">
          <path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0
                   2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/>
        </svg>
        <span class="pay-method-btn__label">신용카드</span>
      </button>

      <!-- 현금 -->
      <button type="button"
              class="pay-method-btn"
              data-method="CASH"
              aria-pressed="false">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="currentColor" width="28" height="28"
             aria-hidden="true" class="pay-method-btn__icon">
          <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85
                   1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16
                   c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3
                   1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2
                   c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5
                   3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>
        </svg>
        <span class="pay-method-btn__label">현금</span>
      </button>

      <!-- 간편결제 -->
      <button type="button"
              class="pay-method-btn"
              data-method="SIMPLE"
              aria-pressed="false">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="currentColor" width="28" height="28"
             aria-hidden="true" class="pay-method-btn__icon">
          <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0
                   2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14zm-4.2-5.78v1.75
                   l3.2-2.99L12.8 9v1.7c-3.11.43-4.35 2.56-4.8 4.7
                   1.11-1.49 2.4-2.18 4.8-2.18z"/>
        </svg>
        <span class="pay-method-btn__label">간편결제</span>
      </button>

    </div>
  </section>


  <!-- ══════════════════════════════════════════════════════════════════
       하단 고정 결제 버튼
       결제 수단이 선택되거나 총 금액이 0원일 때 활성화 (JS 제어)
  ══════════════════════════════════════════════════════════════════ -->
  <div class="payment-action-bar">
    <button type="button"
            class="btn btn--primary btn--lg"
            id="btn-pay"
            disabled
            aria-disabled="true">
      결제하기
    </button>
  </div>


  <!-- ══════════════════════════════════════════════════════════════════
       Thymeleaf → JS 데이터 브릿지
       서버 데이터를 JS 전역 상수로 안전하게 전달.
       th:inline="javascript" 로 Thymeleaf가 JS 이스케이프 처리함.
  ══════════════════════════════════════════════════════════════════ -->
  <script th:inline="javascript">
    /*<![CDATA[*/

    /**
     * 예매 ID. POST /api/payment 요청 바디에 포함.
     * @type {number}
     */
    const RESERVATION_ID = /*[[${reservation != null ? reservation.id : 0}]]*/ 0;

    /**
     * 상영 스케줄 ID.
     * @type {number}
     */
    const SCHEDULE_ID = /*[[${schedule != null ? schedule.id : 0}]]*/ 0;

    /**
     * 좌석 번호 목록 (예: ["A1", "A2"]).
     * reservation.seatNumber가 없으면 빈 배열.
     * @type {string[]}
     */
    const SEAT_NUMBERS = /*[[${reservation != null ? reservation.seatNumber : {}}]]*/ [];

    /**
     * 기본 좌석 요금 (원 단위). 성인 1인 기준.
     * 청소년은 이 금액의 80%.
     * @type {number}
     */
    const SEAT_COST = /*[[${theater != null ? theater.cost : 15000}]]*/ 15000;

    /**
     * 성인 인원 수.
     * @type {number}
     */
    const ADULT_COUNT = /*[[${adultCount != null ? adultCount : 1}]]*/ 1;

    /**
     * 청소년 인원 수.
     * @type {number}
     */
    const TEEN_COUNT = /*[[${teenCount != null ? teenCount : 0}]]*/ 0;

    /**
     * 적용 가능한 할인 정책 목록.
     * @type {Array<{id:number, policyName:string, discountType:'RATIO'|'WON', discountValue:number, conditionType:string}>}
     */
    const DISCOUNT_POLICIES = /*[[${discountPolicies}]]*/ [];

    /**
     * 포인트 적립 정책 목록 (UC-07 적립 예고 표시용).
     * @type {Array<{id:number, policyName:string, giveValue:number}>}
     */
    const BONUS_POLICIES = /*[[${bonusPolicies}]]*/ [];

    /**
     * 인증된 회원 휴대폰 번호. 미인증 시 null.
     * @type {string|null}
     */
    const MEMBER_PHONE = /*[[${member != null ? member.phone : null}]]*/ null;

    /**
     * 인증된 회원 보유 포인트. 미인증 시 0.
     * @type {number}
     */
    const MEMBER_POINT = /*[[${member != null ? member.point : 0}]]*/ 0;

    /*]]>*/
  </script>

  <!-- 페이지 전용 JS -->
  <script th:src="@{/js/booking/payment.js}"></script>

</main>
</body>
</html>
