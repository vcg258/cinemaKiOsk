<!DOCTYPE html>
<!--
  layout/base.html
  ─────────────────────────────────────────────────────────────────────────
  고객(회원)용 공통 레이아웃 템플릿.
  Thymeleaf 네이티브 fragment 파라미터 방식으로 구현.

  ▶ 사용법 (각 페이지 html 최상단에 작성)
  ──────────────────────────────────────────
  <html xmlns:th="http://www.thymeleaf.org"
        th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
  <head><title>페이지 제목</title></head>
  <body>
    <main>
      이 안에 페이지 고유 콘텐츠 작성
    </main>
  </body>
  </html>
  ──────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content, headExtra)"
      lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 동적 타이틀: 호출 페이지에서 <title> 태그로 전달 -->
  <title th:replace="${title}">CineOS</title>

  <!-- ── 폰트 ─────────────────────────────── -->
  <!-- Pretendard 웹폰트 (@font-face 선언) -->
  <link rel="stylesheet" th:href="@{/css/fonts.css}">

  <!-- ── 공통 CSS ──────────────────────────── -->
  <!-- 디자인 토큰 (CSS 변수) + 라이트/다크 테마 -->
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <!-- 공용 컴포넌트 스타일 (버튼, 카드, 모달, 알림 등) -->
  <link rel="stylesheet" th:href="@{/css/components.css}">

  <!-- ── 페이지별 추가 CSS (호출 측에서 th:replace로 주입 가능) ── -->
  <!--
    사용 예시 (각 페이지에서 <head> 안에 추가):
    <link rel="stylesheet" th:href="@{/css/movie.css}">
    현재는 각 페이지 html이 직접 <link>를 선언하는 방식 사용.
  -->

  <!-- ── 페이지별 추가 CSS/메타 태그 ───────────── -->
  <!--
    각 페이지에서 headExtra 파라미터로 주입.
    사용법: th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::link})}"
    페이지 전용 CSS가 없을 때는 ~{} (빈 fragment)를 전달.
  -->
  <th:block th:replace="${headExtra}"></th:block>

  <!-- ── 외부 CDN ──────────────────────────── -->
  <!-- Axios: REST API fetch 래퍼에 사용 -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
  <!-- SockJS + STOMP: WebSocket(좌석 실시간 연동, UC-03) 에 사용 -->
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
</head>

<body>

  <!-- ══════════════════════════════════════════════
       HEADER — 로고 + 상단 네비게이션
       fragments/nav.html 의 nav fragment를 삽입
  ══════════════════════════════════════════════ -->
  <header class="site-header" th:replace="~{fragments/nav :: nav}">
    <!-- 빌드 전 정적 미리보기용 fallback (Thymeleaf 처리 시 교체됨) -->
    <span>Nav Placeholder</span>
  </header>

  <!-- ══════════════════════════════════════════════
       MAIN — 각 페이지 콘텐츠 영역
       호출 측에서 <main> 태그 내용이 이 자리에 삽입됨
  ══════════════════════════════════════════════ -->
  <main class="site-main" th:replace="${content}">
    <!-- 호출 페이지의 <main> 내용이 이 자리에 삽입됨 -->
  </main>

  <!-- ══════════════════════════════════════════════
       FOOTER — 하단 홈 버튼 + 현재 시각
  ══════════════════════════════════════════════ -->
  <footer class="site-footer">
    <!-- 홈으로 돌아가기 버튼 -->
    <a th:href="@{/}" class="footer-home-btn" aria-label="처음 화면으로 이동">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="currentColor" width="24" height="24" aria-hidden="true">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      <span>처음으로</span>
    </a>

    <!-- 현재 시각 (JS로 실시간 업데이트) -->
    <div class="footer-clock">
      <time id="footer-time">00:00</time>
    </div>
  </footer>

  <!-- ══════════════════════════════════════════════
       MODAL — 공용 모달 오버레이
       fragments/modal.html 의 modal fragment를 삽입
  ══════════════════════════════════════════════ -->
  <div th:replace="~{fragments/modal :: modal}">
    <!-- modal placeholder -->
  </div>

  <!-- ══════════════════════════════════════════════
       ALERT — 토스트 알림 컨테이너
       fragments/alert.html 의 alert-container fragment를 삽입
  ══════════════════════════════════════════════ -->
  <div th:replace="~{fragments/alert :: alert-container}">
    <!-- alert placeholder -->
  </div>

  <!-- ── 공통 JS ──────────────────────────── -->
  <!-- 공용 유틸 함수 (fetch wrapper, 에러 핸들러, 모달/알림 제어 등) -->
  <script th:src="@{/js/common.js}"></script>

  <!-- 푸터 시계 업데이트 스크립트 -->
  <script>
    (function () {
      /**
       * 현재 시각을 HH:MM 형식으로 footer-time 요소에 표시.
       * 1초마다 업데이트.
       */
      function updateClock() {
        const now = new Date();
        const hh  = String(now.getHours()).padStart(2, '0');
        const mm  = String(now.getMinutes()).padStart(2, '0');
        const el  = document.getElementById('footer-time');
        if (el) el.textContent = `${hh}:${mm}`;
      }

      // 즉시 실행 후 1분마다 갱신 (초 단위 갱신이 필요하면 1000으로 변경)
      updateClock();
      setInterval(updateClock, 60_000);
    })();
  </script>

</body>
</html>
