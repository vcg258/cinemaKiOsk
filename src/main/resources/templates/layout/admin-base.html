<!DOCTYPE html>
<!--
  layout/admin-base.html
  ─────────────────────────────────────────────────────────────────────────
  관리자용 공통 레이아웃 템플릿.
  UC-11(관리자 로그인) 이후 접근 가능한 모든 관리자 화면에 사용.

  ▶ 사용법
  ──────────────────────────────────────────
  <html xmlns:th="http://www.thymeleaf.org"
        th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">
  <head>
    <title>관리자 페이지 제목</title>
    페이지별 추가 CSS
    <link rel="stylesheet" th:href="@{/css/admin.css}">
  </head>
  <body>
    <main>
      관리자 페이지 고유 콘텐츠
    </main>
  </body>
  </html>
  ──────────────────────────────────────────

  ▶ 주의사항
  - 이 레이아웃은 UC-11 로그인 완료 후에만 접근 가능해야 함.
  - 인증 처리는 Spring Security (컨트롤러/Security Config) 에서 담당.
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)"
      lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 동적 타이틀 -->
  <title th:replace="${title}">CineOS 관리자</title>

  <!-- ── 폰트 & 공통 CSS ──────────────────── -->
  <link rel="stylesheet" th:href="@{/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <!-- 관리자 전용 추가 스타일 -->
  <link rel="stylesheet" th:href="@{/css/admin.css}">

  <!-- ── 외부 CDN ──────────────────────────── -->
  <!-- Axios: REST API 호출 -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
  <!-- Chart.js: 통계 차트 (UC-12~16) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>

<body class="admin-body">

  <!-- ══════════════════════════════════════════════
       ADMIN HEADER — 로고 + 로그아웃만 (네비는 사이드바로 이동)
  ══════════════════════════════════════════════ -->
  <header class="admin-header">
    <div class="admin-header__inner">

      <!-- 로고 + 관리자 배지 -->
      <a th:href="@{/admin/statistics/dashboard}" class="admin-header__logo-link">
        <img th:src="@{/images/logo_cineos.svg}"
             src="/images/logo_cineos.svg"
             alt="CineOS 로고" class="admin-header__logo">
        <span class="admin-badge">관리자</span>
      </a>

      <!-- 로그아웃 버튼 -->
      <form th:action="@{/admin/logout}" method="post" class="admin-logout-form">
        <!-- Spring Security CSRF 토큰 (Security 설정 시 활성화) -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"
               th:if="${_csrf != null}">
        <button type="submit" class="btn btn--ghost admin-logout-btn">로그아웃</button>
      </form>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════
       ADMIN LAYOUT BODY — 사이드바(네비) + 메인 콘텐츠
  ══════════════════════════════════════════════ -->
  <div class="admin-layout">

    <!-- ── 좌측 사이드바 네비게이션 ─────────────── -->
    <aside class="admin-sidebar" aria-label="관리자 메뉴">
      <nav>
        <ul class="admin-sidebar-menu">

          <!-- 대시보드 -->
          <li class="admin-sidebar-menu__item">
            <a th:href="@{/admin/statistics/dashboard}" data-nav="dashboard">
              대시보드
            </a>
          </li>

          <!-- ── 통계 섹션 (UC-12~16) ── -->
          <li class="admin-sidebar-menu__section">통계</li>

          <li class="admin-sidebar-menu__item">
            <a th:href="@{/admin/statistics/stats/daily}" data-nav="stats-daily">
              일일 통계
            </a>
          </li>
          <li class="admin-sidebar-menu__item">
            <a th:href="@{/admin/statistics/stats/monthly}" data-nav="stats-monthly">
              월별 통계
            </a>
          </li>
          <li class="admin-sidebar-menu__item">
            <a th:href="@{/admin/statistics/stats/by-day}" data-nav="stats-by-day">
              요일별 통계
            </a>
          </li>
          <li class="admin-sidebar-menu__item">
            <a th:href="@{/admin/statistics/stats/by-hour}" data-nav="stats-by-hour">
              시간대별 통계
            </a>
          </li>
          <li class="admin-sidebar-menu__item">
            <a th:href="@{/admin/statistics/stats/by-movie}" data-nav="stats-by-movie">
              영화별 통계
            </a>
          </li>

          <!-- ── 운영 섹션 ── -->
          <li class="admin-sidebar-menu__section">운영</li>

          <!-- UC-17: 환불 처리 -->
          <li class="admin-sidebar-menu__item">
            <a th:href="@{/admin/refund}" data-nav="refund">
              환불 처리
            </a>
          </li>

          <!-- UC-18~20: 영화 관리 -->
          <li class="admin-sidebar-menu__item">
            <a th:href="@{/admin/management/movie/manage}" data-nav="movie">
              영화 관리
            </a>
          </li>

          <!-- UC-21: 상영관 관리 -->
          <li class="admin-sidebar-menu__item">
            <a th:href="@{/admin/management/theater/edit}" data-nav="theater">
              상영관 관리
            </a>
          </li>

          <!-- 정책 관리 -->
          <li class="admin-sidebar-menu__item">
            <a th:href="@{/admin/management/policy/list}" data-nav="policy">
              정책 관리
            </a>
          </li>

        </ul>
      </nav>
    </aside>

    <!-- 메인 콘텐츠 영역 -->
    <main class="admin-main" th:replace="${content}">
      <!-- 호출 페이지의 <main> 내용이 이 자리에 삽입됨 -->
    </main>

  </div>

  <!-- ══════════════════════════════════════════════
       MODAL & ALERT (공용 fragment 재사용)
  ══════════════════════════════════════════════ -->
  <div th:replace="~{fragments/modal :: modal}"></div>
  <div th:replace="~{fragments/alert :: alert-container}"></div>

  <!-- ── 공통 JS ──────────────────────────── -->
  <script th:src="@{/js/common.js}"></script>

  <!-- 사이드바 현재 URL 기반 활성 메뉴 표시 -->
  <script>
    (function () {
      /**
       * 현재 pathname을 읽어서 매칭되는 사이드바 링크에 is-active 클래스 부여.
       * data-nav 속성 값으로 간단히 매핑.
       */
      const path = window.location.pathname;

      /* pathname → data-nav 키 매핑 테이블 */
      const navMap = [
        { key: 'dashboard',      match: /\/admin\/statistics\/dashboard/ },
        { key: 'stats-daily',    match: /\/stats\/daily/ },
        { key: 'stats-monthly',  match: /\/stats\/monthly/ },
        { key: 'stats-by-day',   match: /\/stats\/by-day/ },
        { key: 'stats-by-hour',  match: /\/stats\/by-hour/ },
        { key: 'stats-by-movie', match: /\/stats\/by-movie/ },
        { key: 'refund',         match: /\/admin\/refund/ },
        { key: 'movie',          match: /\/management\/movie/ },
        { key: 'theater',        match: /\/management\/theater|\/management\/seat/ },
        { key: 'policy',         match: /\/management\/policy/ },
      ];

      navMap.forEach(({ key, match }) => {
        if (match.test(path)) {
          const link = document.querySelector(`[data-nav="${key}"]`);
          if (link) link.classList.add('is-active');
        }
      });
    })();
  </script>

</body>
</html>
