<!DOCTYPE html>
<!--
  templates/movie/list.html
  ─────────────────────────────────────────────────────────────────────────
  UC-01: 상영작 목록 페이지 (고객용)

  ▶ 기능 요약
    - 탭: 현재 상영 중 / 상영 예정 전환
    - 필터: 장르 · 등급 · 상영관 유형 (버튼 그룹, 단일 선택)
    - 검색: 터치 키보드 기반 키워드 검색 (검색 버튼 or 엔터)
    - 카드 그리드: 포스터 · 제목 · 장르 · 등급 배지 · 상영 시간 표시
    - 정렬: 서버에서 현재 시각 기준 가장 가까운 상영 시간 순으로 반환

  ▶ 레이아웃
    layout/base.html :: layout(title, content, headExtra) 사용
    headExtra 로 movie.css 를 <head>에 주입.

  ▶ 연결 UC
    → UC-02: 카드 클릭 시 /movies/{id} 로 이동 (영화 상세)

  ▶ 파일 위치
    templates/movie/list.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::link})}">

<head>
  <title>현재 상영작 | CineOS</title>
  <!--
    페이지 전용 CSS.
    headExtra 파라미터를 통해 base.html <head> 안에 주입됨.
    ~{::link} 표현식이 이 <link> 요소를 캡처함.
  -->
  <link rel="stylesheet" th:href="@{/css/movie.css}">
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       페이지 헤더
  ══════════════════════════════════════════════════════════════════ -->
  <div class="page-header">
    <h1 class="page-title">영화</h1>
  </div>


  <!-- ══════════════════════════════════════════════════════════════════
       탭: 현재 상영 중 / 상영 예정
       - role="tablist" + role="tab" 으로 접근성 지원
       - 활성 탭은 JS에서 movie-tab--active 클래스로 관리
  ══════════════════════════════════════════════════════════════════ -->
  <div class="movie-tabs" role="tablist" aria-label="상영 구분">

    <!-- 현재 상영 중 탭 (기본 활성) -->
    <button type="button"
            class="movie-tab movie-tab--active"
            role="tab"
            aria-selected="true"
            data-tab="now"
            id="tab-now"
            aria-controls="movie-grid-panel">
      현재 상영 중
    </button>

    <!-- 상영 예정 탭 -->
    <button type="button"
            class="movie-tab"
            role="tab"
            aria-selected="false"
            data-tab="upcoming"
            id="tab-upcoming"
            aria-controls="movie-grid-panel">
      상영 예정
    </button>

  </div>


  <!-- ══════════════════════════════════════════════════════════════════
       필터 바: 장르 · 등급 · 상영관 유형 · 키워드 검색
       - 각 필터 그룹은 JS에서 동적으로 버튼 생성
       - 검색은 터치 키보드(inputmode="search") 지원
  ══════════════════════════════════════════════════════════════════ -->
  <section class="filter-bar" aria-label="필터 및 검색">

    <!-- ── 장르 필터 ── -->
    <div class="filter-row">
      <span class="filter-label" id="label-genre">장르</span>
      <div class="filter-chip-group"
           id="filter-genre"
           role="group"
           aria-labelledby="label-genre">
        <!--
          JS의 GENRE_OPTIONS 배열을 기반으로 renderFilterGroup() 이 버튼 생성.
          예: 전체 / 액션 / 로맨스 / 공포 / 코미디 / SF / 애니메이션 / 드라마
        -->
      </div>
    </div>

    <!-- ── 관람 등급 필터 ── -->
    <div class="filter-row">
      <span class="filter-label" id="label-rating">등급</span>
      <div class="filter-chip-group"
           id="filter-rating"
           role="group"
           aria-labelledby="label-rating">
        <!--
          JS의 RATING_OPTIONS 배열을 기반으로 버튼 생성.
          예: 전체 / 전체관람가 / 12세 / 15세 / 청소년관람불가
        -->
      </div>
    </div>

    <!-- ── 상영관 유형 필터 ── -->
    <div class="filter-row">
      <span class="filter-label" id="label-theater">상영관</span>
      <div class="filter-chip-group"
           id="filter-theater"
           role="group"
           aria-labelledby="label-theater">
        <!--
          JS의 THEATER_OPTIONS 배열을 기반으로 버튼 생성.
          예: 전체 / 일반관 / IMAX / 4DX
        -->
      </div>
    </div>

    <!-- ── 키워드 검색 ── -->
    <div class="filter-row filter-row--search">
      <span class="filter-label" id="label-search">검색</span>

      <!-- 입력 필드 + X 초기화 버튼 묶음 -->
      <div class="search-wrap">
        <!--
          inputmode="search": 모바일/터치 환경에서 검색용 키보드 표시.
          type="search": 브라우저 기본 X 버튼은 appearance:none으로 제거하고
                         커스텀 clear 버튼 사용.
        -->
        <input type="search"
               id="search-input"
               class="form-control search-input"
               placeholder="영화 제목을 입력하세요"
               autocomplete="off"
               inputmode="search"
               maxlength="50"
               aria-labelledby="label-search">

        <!-- 검색어 초기화 버튼 (입력값 있을 때만 JS가 hidden 해제) -->
        <button type="button"
                class="search-clear-btn"
                id="search-clear-btn"
                aria-label="검색어 지우기"
                hidden>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="currentColor" width="18" height="18" aria-hidden="true">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12
                     5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>

      <!-- 검색 실행 버튼 (엔터 키와 동일 동작) -->
      <button type="button"
              class="btn btn--primary btn--sm search-submit-btn"
              id="search-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="currentColor" width="16" height="16" aria-hidden="true">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5
                   16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61
                   0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99
                   -5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14
                   9.5 11.99 14 9.5 14z"/>
        </svg>
        검색
      </button>

    </div>

  </section>


  <!-- ══════════════════════════════════════════════════════════════════
       결과 영역: 로딩 · 빈 결과 · 카드 그리드
       - aria-live="polite": 내용 변경 시 스크린리더에 알림
       - aria-labelledby: 현재 활성 탭과 연결 (JS에서 동적 갱신)
  ══════════════════════════════════════════════════════════════════ -->
  <section id="movie-grid-panel"
           role="tabpanel"
           aria-labelledby="tab-now"
           aria-live="polite">

    <!-- ── 로딩 상태 (API 호출 중) ── -->
    <div class="status-area" id="movie-loading" hidden>
      <div class="spinner" aria-hidden="true"></div>
      <p class="status-area__text">영화 목록을 불러오는 중...</p>
    </div>

    <!-- ── 빈 결과 상태 ── -->
    <div class="status-area movie-empty" id="movie-empty" hidden>
      <!-- 영화 필름 아이콘 -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="currentColor" width="48" height="48" aria-hidden="true">
        <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1
                 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
      </svg>
      <!-- 빈 결과 메시지는 JS에서 상황에 따라 텍스트 변경 -->
      <p id="movie-empty-text" class="status-area__text">
        상영 중인 영화가 없습니다.
      </p>
    </div>

    <!-- ── 영화 카드 그리드 (JS에서 동적 렌더링) ── -->
    <ul class="movie-grid" id="movie-grid" aria-label="영화 목록">
      <!--
        fetchMovies() 호출 후 renderCards()가 여기에 <li> 카드 삽입.
        각 카드 클릭 시 UC-02 상세 페이지(/movies/{id})로 이동.
      -->
    </ul>

  </section>


  <!-- ══════════════════════════════════════════════════════════════════
       페이지 전용 JS
       - common.js(CineOS 네임스페이스)가 base.html body 하단에 먼저 로드됨.
       - 이 스크립트는 <main> 내부에 위치하지만, DOMContentLoaded 안에서
         CineOS를 사용하므로 실행 순서 문제 없음.
         (DOMContentLoaded는 모든 동기 스크립트 실행 완료 후 발생)
  ══════════════════════════════════════════════════════════════════ -->
  <script th:src="@{/js/movie/list.js}"></script>

</main>
</body>
</html>
