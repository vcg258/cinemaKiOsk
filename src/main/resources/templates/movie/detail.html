<!DOCTYPE html>
<!--
  templates/movie/detail.html
  ─────────────────────────────────────────────────────────────────────────
  UC-02: 상영작 상세 조회 페이지 (고객용)

  ▶ 기능 요약
    - 영화 포스터 · 제목 · 장르 · 등급 · 러닝타임 · 감독 · 배우 · 줄거리 표시
    - 전석 매진 / 당일 상영 종료 시 '예매하기' 버튼 비활성화 + '매진' 표시
    - '예매하기' 버튼 클릭 → UC-03 (booking/schedule) 으로 이동

  ▶ Controller → View 전달 Model 속성
    - movie      : MovieDTO     영화 상세 정보
                   └ movieId, title, genre, rating, runtime,
                     director, actors, description, startAt, endAt
    - isSoldOut  : Boolean      전석 매진 여부 (컨트롤러에서 판단)
    - posterUrl  : String       포스터 이미지 경로
                                TODO: 백엔드 필드명·URL 패턴 확정 필요

  ▶ 연결 UC
    ← UC-01: 목록에서 영화 카드 클릭 시 진입
    → UC-03: '예매하기' 버튼 클릭 시 /booking/schedule?movieId={id} 로 이동

  ▶ 파일 위치
    templates/movie/detail.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::link})}">

<head>
  <meta charset="UTF-8">
  <!-- 동적 타이틀: 영화 제목 + " | CineOS" -->
  <title th:text="${movie.title} + ' | CineOS'">영화 상세 | CineOS</title>

  <!--
    페이지 전용 CSS.
    ~{::link} 표현식이 이 <link> 요소를 캡처해 base.html <head>에 주입함.
  -->
  <link rel="stylesheet" th:href="@{/css/movie.css}">
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       뒤로가기 버튼 — 목록으로 복귀 (UC-01)
  ══════════════════════════════════════════════════════════════════ -->
  <div class="detail-back-wrap">
    <a th:href="@{/movie/list}" class="btn btn--ghost btn--sm detail-back-btn">
      <!-- 왼쪽 화살표 아이콘 -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="currentColor" width="18" height="18" aria-hidden="true">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
      목록으로
    </a>
  </div>


  <!-- ══════════════════════════════════════════════════════════════════
       히어로 섹션 — 포스터 + 기본 정보
  ══════════════════════════════════════════════════════════════════ -->
  <section class="movie-detail__hero">

    <!-- ── 포스터 이미지 ──────────────────────────────────────────── -->
    <div class="movie-detail__poster-wrap">
      <!--
        posterUrl: 컨트롤러에서 model.addAttribute("posterUrl", ...) 로 전달.
        TODO: 백엔드 담당자와 URL 패턴 확정 후 th:src 조정.
        폴백: placeholder-poster.jpg (onerror 및 Elvis 연산자 이중 처리)
      -->
      <img
        th:src="${posterUrl} ?: @{/images/placeholder-poster.jpg}"
        th:alt="${movie.title} + ' 포스터'"
        src="/images/placeholder-poster.jpg"
        alt="포스터"
        class="movie-detail__poster-img"
        onerror="this.src='/images/placeholder-poster.jpg'"
      >

      <!--
        매진 배지: isSoldOut=true 일 때만 포스터 위에 표시.
      -->
      <div class="movie-detail__sold-out-badge"
           th:if="${isSoldOut}"
           aria-label="매진">
        매진
      </div>
    </div>


    <!-- ── 텍스트 정보 영역 ──────────────────────────────────────── -->
    <div class="movie-detail__info">

      <!-- 제목 -->
      <h1 class="movie-detail__title" th:text="${movie.title}">영화 제목</h1>

      <!-- 장르 + 관람등급 배지 -->
      <div class="movie-detail__tags">
        <!--
          rating 값에 따라 배지 클래스 동적 적용.
          ENUM: ALL(전체관람가) / 12 / 15 / 19(청소년관람불가)
          components.css의 .badge--* 클래스 사용.
        -->
        <!--
          th:classappend / th:text : 단일 ${...} 안에서 삼항 연산 체이닝.
          ${...} 안에서는 변수를 ${} 없이 직접 참조해야 함 (중첩 ${} 불가).
          MovieDTO.rating: 'ALL' | 'TWELVE' | 'FIFTEEN' | 'NINETEEN'
          ※ MovieDTO.from() 에서 entity.getRating().name() 으로 변환되므로
             현재 enum 이름(TWELVE 등)이 내려옴. 추후 백엔드에서 getValue()로 교체 필요.
             지금은 getvalue() 기반인 경우도 커버하도록 양쪽 다 처리.
        -->
        <span class="badge"
              th:classappend="${movie.rating == 'ALL'    ? 'badge--all' :
                               movie.rating == '12'     ? 'badge--12'  :
                               movie.rating == 'TWELVE' ? 'badge--12'  :
                               movie.rating == '15'     ? 'badge--15'  :
                               movie.rating == 'FIFTEEN'? 'badge--15'  :
                               movie.rating == '19'     ? 'badge--18'  :
                               movie.rating == 'NINETEEN'?'badge--18'  : ''}"
              th:text="${movie.rating == 'ALL'     ? '전체관람가'    :
                        movie.rating == '12'       ? '12세'          :
                        movie.rating == 'TWELVE'   ? '12세'          :
                        movie.rating == '15'       ? '15세'          :
                        movie.rating == 'FIFTEEN'  ? '15세'          :
                        movie.rating == '19'       ? '청소년관람불가' :
                        movie.rating == 'NINETEEN' ? '청소년관람불가' : movie.rating}">
          등급
        </span>

        <span class="movie-detail__genre" th:text="${movie.genre}">장르</span>
      </div>


      <!-- 상세 스펙 목록 (dt/dd 구조) -->
      <dl class="movie-detail__specs">

        <!-- 러닝타임 -->
        <div class="movie-detail__spec-row">
          <dt class="movie-detail__spec-label">
            <!-- 시계 아이콘 -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="currentColor" width="16" height="16" aria-hidden="true">
              <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22
                       17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8
                       8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5
                       -2.67V7z"/>
            </svg>
            상영 시간
          </dt>
          <!--
            runtime: 분 단위 Long.
            data-runtime 속성에 원본값 저장 → detail.js에서 "1시간 49분" 형식으로 변환.
            JS 미로드 시 폴백으로 "OO분" 그대로 표시.
          -->
          <dd class="movie-detail__spec-value"
              id="movie-runtime"
              th:data-runtime="${movie.runtime}"
              th:text="${movie.runtime} + '분'">
            -
          </dd>
        </div>

        <!-- 감독 -->
        <div class="movie-detail__spec-row">
          <dt class="movie-detail__spec-label">
            <!-- 비디오 카메라 아이콘 -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="currentColor" width="16" height="16" aria-hidden="true">
              <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1
                       1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
            </svg>
            감독
          </dt>
          <dd class="movie-detail__spec-value" th:text="${movie.director}">감독명</dd>
        </div>

        <!-- 주연 배우 (값이 있을 때만 노출) -->
        <!-- MovieDTO 필드명: actors (actor 아님) -->
        <div class="movie-detail__spec-row"
             th:if="${not #strings.isEmpty(movie.actors)}">
          <dt class="movie-detail__spec-label">
            <!-- 사람 그룹 아이콘 -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="currentColor" width="16" height="16" aria-hidden="true">
              <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3
                       3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5
                       5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0
                       -2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97
                       1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
            </svg>
            주연
          </dt>
          <dd class="movie-detail__spec-value" th:text="${movie.actors}">배우명</dd>
        </div>

        <!-- 상영 기간 -->
        <div class="movie-detail__spec-row">
          <dt class="movie-detail__spec-label">
            <!-- 캘린더 아이콘 -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="currentColor" width="16" height="16" aria-hidden="true">
              <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99
                       2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3
                       18H5V8h14v11z"/>
            </svg>
            상영 기간
          </dt>
          <dd class="movie-detail__spec-value">
            <!--
              startAt / endAt : LocalDateTime → yyyy.MM.dd 형식으로 포맷.
              endAt 가 null 일 수 있으므로 th:if 조건 처리.
            -->
            <span th:text="${#temporals.format(movie.startAt, 'yyyy.MM.dd')}">0000.00.00</span>
            <span th:if="${movie.endAt != null}">
              ~ <span th:text="${#temporals.format(movie.endAt, 'yyyy.MM.dd')}">0000.00.00</span>
            </span>
          </dd>
        </div>

      </dl>


      <!-- 예매 버튼 영역 -->
      <div class="movie-detail__actions">
        <!--
          isSoldOut = true  → disabled 처리 + "매진" 텍스트
          isSoldOut = false → 활성화 + "예매하기" 텍스트
          클릭 이벤트: detail.js의 goToBooking(movieId) 호출.
          data-movie-id: JS에서 movieId를 읽기 위한 data 속성.
        -->
        <button
          type="button"
          class="btn btn--primary btn--lg btn--full"
          id="btn-book"
          th:disabled="${isSoldOut}"
          th:text="${isSoldOut} ? '매진' : '예매하기'"
          th:data-movie-id="${movie.movieId}"
          th:aria-label="${isSoldOut} ? '매진된 영화입니다' : ${movie.title} + ' 예매하기'">
          예매하기
        </button>

        <!-- 매진 안내 보조 텍스트 -->
        <p class="movie-detail__sold-out-msg"
           th:if="${isSoldOut}">
          현재 모든 좌석이 매진되었습니다.
        </p>
      </div>

    </div>
    <!-- /movie-detail__info -->

  </section>
  <!-- /movie-detail__hero -->


  <!-- ══════════════════════════════════════════════════════════════════
       줄거리 섹션 (description 있을 때만 렌더)
  ══════════════════════════════════════════════════════════════════ -->
  <section class="movie-detail__synopsis"
           th:if="${not #strings.isEmpty(movie.description)}">
    <h2 class="movie-detail__section-title">줄거리</h2>
    <p class="movie-detail__synopsis-text" th:text="${movie.description}">
      줄거리 내용이 여기에 표시됩니다.
    </p>
  </section>


  <!-- ══════════════════════════════════════════════════════════════════
       페이지 전용 JS (detail.js 생성 완료)
  ══════════════════════════════════════════════════════════════════ -->
  <script th:src="@{/js/movie/detail.js}"></script>

</main>
</body>
</html>
