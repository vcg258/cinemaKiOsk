<!DOCTYPE html>
<!--
  templates/booking/seat.html
  ─────────────────────────────────────────────────────────────────────────
  UC-03: 예매하기 — 좌석 선택 단계 (고객용)

  ▶ 기능 요약
    - 선택된 상영 스케줄에 대한 좌석 맵 표시
    - 좌석 상태: 선택 가능 / 선택 중(내가 선택) / 예매 완료(타인)
    - WebSocket(STOMP/SockJS)으로 실시간 좌석 상태 동기화
    - 인원 수만큼 좌석 선택 후 '다음' 버튼 활성화
    - '다음' 버튼 → UC-04 결제 화면으로 이동

  ▶ Controller → View 전달 Model 속성
    - schedule   : ScheduleDTO    선택된 상영 스케줄 정보
                   └ id, no, movieId, startTime, endTime
    - theater    : TheaterDTO     상영관 정보
                   └ no, name, cost
    - movie      : MovieDTO       예매 대상 영화 정보 (요약 표시용)
                   └ movieId, title, rating
    - adultCount : Integer        선택한 성인 인원 수 (schedule.html에서 전달)
    - teenCount  : Integer        선택한 청소년 인원 수

  ▶ WebSocket 연결 정보
    - 엔드포인트: /ws (SockJS)
    - 구독 경로:  /topic/seat/{scheduleId}
    - 발행 경로:  /app/seat/select, /app/seat/release
    - 연결/해제:  seat.js의 connectWS() / disconnectWS()

  ▶ 연결 UC
    ← UC-03 schedule: 날짜·시간·인원 확정 후 진입 (?scheduleId=&adultCount=&teenCount=)
    → UC-04: '다음' 버튼 클릭 시 /payment/payment 으로 이동

  ▶ 파일 위치
    templates/booking/seat.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::link})}">

<head>
  <title>좌석 선택 | CineOS</title>
  <!-- 좌석 맵 전용 CSS -->
  <link rel="stylesheet" th:href="@{/css/seat.css}">
</head>

<body>
<main class="seat-main">

  <!-- ══════════════════════════════════════════════════════════════════
       예매 단계 표시기 (2단계: 좌석 선택)
  ══════════════════════════════════════════════════════════════════ -->
  <ol class="steps" aria-label="예매 단계">
    <li class="steps__item steps__item--done">
      <span class="steps__num">✓</span>
      <span class="steps__label">날짜·시간</span>
    </li>
    <li class="steps__item steps__item--active" aria-current="step">
      <span class="steps__num">2</span>
      <span class="steps__label">좌석</span>
    </li>
    <li class="steps__item">
      <span class="steps__num">3</span>
      <span class="steps__label">결제</span>
    </li>
  </ol>


  <!-- ══════════════════════════════════════════════════════════════════
       예매 정보 요약 헤더
       영화명 / 날짜 / 시간 / 상영관 / 선택 인원 표시
  ══════════════════════════════════════════════════════════════════ -->
  <section class="seat-booking-summary" aria-label="예매 정보">

    <div class="seat-booking-summary__row">
      <!-- 영화 제목 -->
      <span class="seat-booking-summary__title" th:text="${movie.title}">영화 제목</span>

      <!-- 관람등급 배지 -->
      <span class="badge badge--sm"
            th:classappend="${movie.rating == 'ALL'     ? 'badge--all' :
                             movie.rating == '12'      ? 'badge--12'  :
                             movie.rating == 'TWELVE'  ? 'badge--12'  :
                             movie.rating == '15'      ? 'badge--15'  :
                             movie.rating == 'FIFTEEN' ? 'badge--15'  :
                             movie.rating == '19'      ? 'badge--18'  :
                             movie.rating == 'NINETEEN'? 'badge--18'  : ''}"
            th:text="${movie.rating == 'ALL'      ? '전체관람가'    :
                      movie.rating == '12'        ? '12세'          :
                      movie.rating == 'TWELVE'    ? '12세'          :
                      movie.rating == '15'        ? '15세'          :
                      movie.rating == 'FIFTEEN'   ? '15세'          :
                      movie.rating == '19'        ? '청소년관람불가' :
                      movie.rating == 'NINETEEN'  ? '청소년관람불가' : movie.rating}">
        등급
      </span>
    </div>

    <div class="seat-booking-summary__row">
      <!-- 날짜·시간: JS에서 포맷 후 교체 -->
      <span class="seat-booking-summary__datetime"
            id="summary-datetime"
            th:data-start="${schedule != null ? schedule.startTime : ''}"
            th:data-end="${schedule != null ? schedule.endTime : ''}">
        -
      </span>

      <!-- 상영관 번호 -->
      <span class="seat-booking-summary__theater"
            th:text="${schedule != null ? schedule.no + '관' : '-'}">
        -
      </span>
    </div>

    <div class="seat-booking-summary__row">
      <!-- 인원 정보 (쿼리 파라미터로 전달된 값) -->
      <span class="seat-booking-summary__people">
        성인
        <strong th:text="${adultCount != null ? adultCount : 0}">0</strong>명
        <th:block th:if="${teenCount != null and teenCount > 0}">
          · 청소년 <strong th:text="${teenCount}">0</strong>명
        </th:block>
        · 총
        <strong id="summary-total-count"
                th:text="${(adultCount != null ? adultCount : 0) + (teenCount != null ? teenCount : 0)}">
          0
        </strong>명
      </span>
    </div>

  </section>


  <!-- ══════════════════════════════════════════════════════════════════
       WebSocket 연결 상태 표시
       연결 성공 시 숨김, 연결 실패 시 경고 표시
  ══════════════════════════════════════════════════════════════════ -->
  <div class="ws-status" id="ws-status" hidden>
    <!-- JS에서 상황에 따라 내용 주입 -->
  </div>


  <!-- ══════════════════════════════════════════════════════════════════
       스크린 표시
  ══════════════════════════════════════════════════════════════════ -->
  <div class="seat-screen" aria-hidden="true">
    <div class="seat-screen__bar"></div>
    <p class="seat-screen__label">SCREEN</p>
  </div>


  <!-- ══════════════════════════════════════════════════════════════════
       좌석 맵 영역
       seat.js의 renderSeatMap()이 #seat-map 안에 좌석 버튼을 동적 생성.
       초기 좌석 상태는 GET /api/seats?scheduleId= 로 로드.
       이후 WebSocket으로 실시간 갱신.
  ══════════════════════════════════════════════════════════════════ -->
  <section class="seat-map-wrap" aria-labelledby="label-seat">
    <h2 class="sr-only" id="label-seat">좌석 선택</h2>

    <!-- 로딩 상태 -->
    <div class="status-area" id="seat-loading">
      <div class="spinner" aria-hidden="true"></div>
      <p class="status-area__text">좌석 정보를 불러오는 중...</p>
    </div>

    <!-- 좌석 맵 그리드: JS에서 동적 생성 -->
    <div class="seat-map" id="seat-map" role="group" aria-label="좌석 선택 맵" hidden>
      <!-- renderSeatMap()이 여기에 좌석 버튼 삽입 -->
    </div>
  </section>


  <!-- ══════════════════════════════════════════════════════════════════
       좌석 범례 (Legend)
  ══════════════════════════════════════════════════════════════════ -->
  <div class="seat-legend" aria-label="좌석 상태 안내">
    <div class="seat-legend__item">
      <span class="seat-legend__icon seat--available" aria-hidden="true"></span>
      <span>선택 가능</span>
    </div>
    <div class="seat-legend__item">
      <span class="seat-legend__icon seat--selected" aria-hidden="true"></span>
      <span>내가 선택</span>
    </div>
    <div class="seat-legend__item">
      <span class="seat-legend__icon seat--taken" aria-hidden="true"></span>
      <span>예매 완료</span>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════════════════
       하단 고정 액션 바
       선택한 좌석 요약 + '다음' 버튼
  ══════════════════════════════════════════════════════════════════ -->
  <div class="seat-action-bar">

    <!-- 선택 현황 표시 -->
    <div class="seat-action-bar__info">
      <span class="seat-action-bar__selected-label">선택된 좌석</span>
      <!-- 선택된 좌석 목록: JS에서 동적 업데이트 -->
      <span class="seat-action-bar__selected-seats" id="selected-seats-display">
        없음
      </span>
    </div>

    <!-- 다음 버튼: 인원 수만큼 좌석이 선택될 때 활성화 -->
    <button type="button"
            class="btn btn--primary btn--lg"
            id="btn-next"
            disabled
            aria-disabled="true">
      다음 — 결제
    </button>
  </div>


  <!-- ══════════════════════════════════════════════════════════════════
       Thymeleaf → JS 데이터 브릿지
       scheduleId, 인원 수 등 JS에서 필요한 서버 데이터 전달
  ══════════════════════════════════════════════════════════════════ -->
  <script th:inline="javascript">
    /*<![CDATA[*/

    /**
     * 현재 상영 스케줄 ID.
     * WebSocket 구독 경로 (/topic/seat/{scheduleId}) 및 API 호출에 사용.
     * @type {number}
     */
    const SCHEDULE_ID = /*[[${schedule != null ? schedule.id : 0}]]*/ 0;

    /**
     * 상영관 번호.
     * @type {number}
     */
    const THEATER_NO = /*[[${theater != null ? theater.no : 0}]]*/ 0;

    /**
     * 기본 좌석 요금 (원 단위).
     * TODO: 백엔드 SeatPolicy.cost 기준으로 교체.
     * @type {number}
     */
    const SEAT_COST = /*[[${theater != null ? theater.cost : 15000}]]*/ 15000;

    /**
     * 선택해야 하는 총 인원 수 (성인 + 청소년).
     * 이 수만큼 좌석을 선택해야 '다음' 버튼 활성화.
     * @type {number}
     */
    const REQUIRED_SEAT_COUNT = /*[[${(adultCount != null ? adultCount : 1) + (teenCount != null ? teenCount : 0)}]]*/ 1;

    /**
     * 성인 인원 수 (결제 페이지로 전달용).
     * @type {number}
     */
    const ADULT_COUNT = /*[[${adultCount != null ? adultCount : 1}]]*/ 1;

    /**
     * 청소년 인원 수 (결제 페이지로 전달용).
     * @type {number}
     */
    const TEEN_COUNT = /*[[${teenCount != null ? teenCount : 0}]]*/ 0;

    /*]]>*/
  </script>

  <!-- 페이지 전용 JS (WebSocket 포함) -->
  <script th:src="@{/js/booking/seat.js}"></script>

</main>
</body>
</html>
