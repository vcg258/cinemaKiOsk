<!DOCTYPE html>
<!--
  templates/booking/confirm.html
  ─────────────────────────────────────────────────────────────────────────
  UC-07: 포인트 적립 / 예매 완료 확인증 (고객용)

  ▶ 기능 요약
    - 결제 완료 후 예매 확인증 표시
    - 자동 포인트 적립 완료 메시지 표시
    - 포인트 적립 실패 시 안내 문구 표시
    - 티켓 출력 / 처음으로 돌아가기 버튼

  ▶ Controller → View 전달 Model 속성
    - movie        : MovieDTO              영화 정보
    - schedule     : ScheduleDTO          결제된 상영 스케줄
    - reservation  : ReservationDetailsDTO 예매 내역
                     └ id, scheduleId, phone, reservationTime, seatNumber(List)
    - payment      : PaymentDetailsDTO    결제 내역
                     └ id, reservationId, bonusPolicyId, discountPolicyId,
                       cost, time, usePoint, status(PAY/RETURN/FAIL)
    - earnedPoints : Long                 이번 결제로 적립된 포인트 (0이면 적립 실패)

  ▶ 연결 UC
    ← UC-04: 결제 성공 시 redirect 로 진입
    → 처음 화면 또는 티켓 출력

  ▶ 파일 위치
    templates/booking/confirm.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{})}">

<head>
  <title>예매 완료 | CineOS</title>
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       TODO: UC-07 예매 완료 확인증 구현
       ─────────────────────────────────────────────────────────────────
       구현 항목:
         [ ] 예매 번호:  th:text="${reservation.id}"
         [ ] 영화명:     th:text="${movie.title}"
         [ ] 상영 일시:  th:text="${schedule.startTime}"
         [ ] 상영관:     th:text="${schedule.no} + '관'"
         [ ] 좌석:       th:each="seat : ${reservation.seatNumber}"
         [ ] 결제 금액:  th:text="${payment.cost}"
         [ ] 결제 일시:  th:text="${payment.time}"
         [ ] 포인트 적립 메시지
               earnedPoints > 0 → "○○ 포인트 적립 완료"
               earnedPoints = 0 → "포인트 적립 불가 -- 회원 정보를 확인해 주세요"
               th:if / th:unless 로 분기
         [ ] 티켓 출력 버튼 (window.print() 또는 출력 전용 뷰 이동)
         [ ] '처음으로' 버튼 → th:href="@{/}"
  ══════════════════════════════════════════════════════════════════ -->
  <div class="booking-placeholder">
    <p>UC-07 예매 완료 확인증 — 구현 예정</p>
    <a th:href="@{/}" class="btn btn--primary">처음으로</a>
  </div>

  <!-- 페이지 전용 JS -->
  <script th:src="@{/js/booking/confirm.js}" th:if="${false}"></script>

</main>
</body>
</html>
