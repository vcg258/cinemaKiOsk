<!DOCTYPE html>
<!--
  templates/booking/payment.html
  ─────────────────────────────────────────────────────────────────────────
  UC-04 결제 처리 / UC-05 휴대폰 인증 / UC-06 포인트 사용 (고객용)

  ▶ 기능 요약
    - 최종 결제 확인 화면: 영화·날짜·시간·좌석·총 결제 금액 표시
    - 할인 정책 선택 (이벤트, 쿠폰 등)
    - 포인트 사용 선택 → UC-05 휴대폰 인증 팝업 트리거
    - 전액 포인트 사용 시 결제 수단 선택 단계 생략
    - 임시 점유 타이머 10분 표시 (만료 시 UC-03 재시작)
    - 결제 수단 선택 → '결제하기' 버튼 → UC-07 완료 화면으로 이동

  ▶ Controller → View 전달 Model 속성
    - movie            : MovieDTO              영화 정보 요약
    - schedule         : ScheduleDTO           선택된 상영 스케줄
    - reservation      : ReservationDetailsDTO 예매 내역 (좌석 포함)
                         └ id, scheduleId, phone, reservationTime, seatNumber(List)
    - discountPolicies : List<DiscountPolicyDTO> 적용 가능한 할인 정책 목록
                         └ id, policyName, discountType(RATIO/WON), discountValue,
                           conditionType(TIME/AGE/JOB)
    - bonusPolicies    : List<BonusPolicyDTO>   적립 정책 목록
                         └ id, policyName, giveValue(적립 비율)
    - member           : MembersDTO             포인트 인증 완료 후 세션에서 주입
                         └ phone, point  (인증 전: null)

  ▶ 연결 UC
    ← UC-03 seat: 좌석 선택 완료 후 진입
    ↔ UC-05: 포인트 버튼 클릭 시 phone-verify 팝업 오픈
    ↔ UC-06: 인증 완료 후 포인트 사용 UI 활성화
    → UC-07: 결제 성공 시 /booking/confirm 으로 이동

  ▶ 파일 위치
    templates/booking/payment.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::link})}">

<head>
  <title>결제 | CineOS</title>
  <!-- 결제 단계 전용 CSS -->
  <link rel="stylesheet" th:href="@{/css/payment.css}">
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       TODO: UC-04/05/06 결제 콘텐츠 구현
       ─────────────────────────────────────────────────────────────────
       구현 항목:
         [ ] 상단 타이머 (10분 카운트다운)
               만료 시 "시간 초과로 예매가 취소되었습니다." → UC-03 재이동
         [ ] 예매 정보 요약 (영화명, 날짜, 시간, 좌석, 인원)
         [ ] 할인 정책 선택 (discountPolicies 목록 렌더링)
               th:each="policy : ${discountPolicies}"
         [ ] 포인트 사용 버튼
               → 인증 안된 경우: phone-verify 팝업(fragments/modal) 오픈
               → 인증 완료: 보유 포인트 표시 + 사용 금액 입력 + '전액 사용' 버튼
               → 전액 사용 시 결제 수단 영역 숨김 처리
         [ ] 최종 결제 금액 표시 (JS로 실시간 계산)
         [ ] 결제 수단 선택 (신용카드 / 현금 / 간편결제)
         [ ] '결제하기' 버튼 → POST /api/payment
               성공 시 /booking/confirm 으로 이동
               실패 시 "결제에 실패하였습니다. 다시 시도해 주세요." 알림

       ⚠ 포인트 인증 팝업은 fragments/modal.html 의 공용 모달을 활용하거나
          auth/phone-verify.html 을 별도 팝업으로 로드
  ══════════════════════════════════════════════════════════════════ -->

  <!-- JS에서 읽어가는 데이터 컨테이너 -->
  <div id="payment-data"
       th:attr="data-reservation-id=${reservation != null ? reservation.id : ''}">
  </div>

  <div class="booking-placeholder">
    <p>UC-04 결제 처리 — 구현 예정</p>
    <a th:href="@{/movie/list}" class="btn btn--ghost">← 처음으로</a>
  </div>

  <!-- 페이지 전용 JS -->
  <script th:src="@{/js/booking/payment.js}" th:if="${false}"></script>

</main>
</body>
</html>
