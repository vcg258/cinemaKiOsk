<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<style>
    .seat-btn { width: 50px; height: 50px; margin: 5px; cursor: pointer; }
    /* 내가 잡은 좌석 (노란색) */
    .selected { background-color: yellow; border: 2px solid orange; }
    /* 남이 잡은 좌석 (회색) */
    .occupied { background-color: gray; cursor: not-allowed; }
</style>
<body>
<div id="seat-container">
    <button class="seat-btn" data-seat-number="A1">A1</button>
    <button class="seat-btn" data-seat-number="A2">A2</button>
    <button class="seat-btn" data-seat-number="A3">A3</button>
    <button class="seat-btn" data-seat-number="A4">A4</button>
    <button class="seat-btn" data-seat-number="A5">A5</button>
    <button class="seat-btn" data-seat-number="A6">A6</button>
    <button class="seat-btn" data-seat-number="A7">A7</button>
    <button class="seat-btn" data-seat-number="A8">A8</button>
</div>
</body>
</html>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const scheduleId = parseInt(urlParams.get('scheduleId')) || 1;

    // [중요 1] UUID 유지 (이게 있어야 페이지 이동 후에도 서버가 나를 알아봄)
    let userId = localStorage.getItem('cinema_uuid');
    if (!userId) {
        alert("저장된 uuid가 없어요")
    }

    // [중요 2] 주소에 userId 포함
    const socket = new WebSocket(`ws://localhost:8080/ws/seats?scheduleId=${scheduleId}&userId=${userId}`);
    let selectedSeats = [];

    socket.onopen = () => console.log("서버와 연결되었습니다.");

    socket.onclose = (event) => {
        if (event.code === 1003) {
            alert("잘못된 접근입니다.");
            window.history.back();
        }
    };

    socket.onmessage = (event) => {
        const response = JSON.parse(event.data);
        console.log("수신 메시지:", response);

        if (response.type === "INIT_STATE") {
            // DB 예약 좌석
            if (response.reserved) {
                response.reserved.forEach(seatNum => {
                    const btn = document.querySelector(`[data-seat-number="${seatNum}"]`);
                    if (btn) { btn.disabled = true; btn.classList.add("occupied"); btn.innerText = "예매"; }
                });
            }
            // 선점 좌석 처리
            if (response.occupied) {
                updateSeatStatus(response.occupied, true);
            }
        }
        else if (response.type === "OCCUPIED") {
            updateSeatStatus(response.seats, true);
        }
        else if (response.type === "RELEASED") {
            updateSeatStatus(response.seats, false);
        }
    };

    // [중요 3] 유저 구분을 포함한 상태 업데이트 로직
    function updateSeatStatus(keys, isOccupied) {
        keys.forEach(key => {
            const parts = key.split(":");
            const sId = parseInt(parts[0]);
            const seatNum = parts[1];
            const ownerId = parts[2]; // 서버가 보낸 UUID

            if (sId === scheduleId) {
                const btn = document.querySelector(`[data-seat-number="${seatNum}"]`);
                if (!btn) return;

                if (isOccupied) {
                    if (ownerId === userId) {
                        // 내가 잡은 자리는 노란색으로 유지 (새로고침 시 복구용)
                        btn.classList.add("selected");
                        btn.disabled = false;
                        if (!selectedSeats.find(s => s.seatNumber === seatNum)) {
                            selectedSeats.push({ seatNumber: seatNum });
                        }
                    } else {
                        // 남이 잡은 자리는 회색
                        btn.classList.add("occupied");
                        btn.disabled = true;
                    }
                } else {
                    // 해제 시
                    btn.classList.remove("occupied", "selected");
                    btn.disabled = false;
                    selectedSeats = selectedSeats.filter(s => s.seatNumber !== seatNum);
                }
            }
        });
    }
</script>
