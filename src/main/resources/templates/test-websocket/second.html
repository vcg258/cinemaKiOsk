<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>영화 좌석 선점 테스트</title>
    <style>
        .seat-btn { width: 50px; height: 50px; margin: 5px; cursor: pointer; }
        .selected { background-color: yellow; border: 2px solid orange; } /* 내 좌석 */
        .occupied { background-color: gray; cursor: not-allowed; } /* 남의 좌석 */
    </style>
</head>
<body>

<h3>상영 일정 ID: <span id="current-schedule">1</span></h3>
<p>내 ID: <span id="my-uuid"></span></p>

<div id="seat-container">
    <button class="seat-btn" data-seat-number="A1">A1</button>
    <button class="seat-btn" data-seat-number="A2">A2</button>
    <button class="seat-btn" data-seat-number="A3">A3</button>
    <button class="seat-btn" data-seat-number="A4">A4</button>
    <button class="seat-btn" data-seat-number="A5">A5</button>
    <button class="seat-btn" data-seat-number="A6">A6</button>
    <button class="seat-btn" data-seat-number="A7">A7</button>
    <button class="seat-btn" data-seat-number="A8">A8</button>
</div>

<hr>
<button id="reserve-btn">선택한 좌석 선점 및 결제하기</button>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const scheduleId = parseInt(urlParams.get('scheduleId')) || 1;
    document.getElementById('current-schedule').innerText = scheduleId;

    // [중요 1] UUID 유지 (이게 있어야 페이지 이동 후에도 서버가 나를 알아봄)
    let userId = localStorage.getItem('cinema_uuid');
    if (!userId) {
        userId = crypto.randomUUID();
        localStorage.setItem('cinema_uuid', userId);
    }
    document.getElementById('my-uuid').innerText = userId.substring(0, 8) + "...";

    // [중요 2] 주소에 userId 포함
    const socket = new WebSocket(`ws://localhost:8080/ws/seats?scheduleId=${scheduleId}&userId=${userId}`);

    let selectedSeats = [];

    socket.onopen = () => console.log("서버와 연결되었습니다.");

    socket.onclose = (event) => {
        if (event.code === 1003) {
            alert("잘못된 접근입니다.");
            window.history.back();
        }
    };

    socket.onmessage = (event) => {
        const response = JSON.parse(event.data);
        console.log("수신 메시지:", response);

        if (response.type === "INIT_STATE") {
            // DB 예약 좌석
            if (response.reserved) {
                response.reserved.forEach(seatNum => {
                    const btn = document.querySelector(`[data-seat-number="${seatNum}"]`);
                    if (btn) { btn.disabled = true; btn.classList.add("occupied"); btn.innerText = "예매"; }
                });
            }
            // 선점 좌석 처리
            if (response.occupied) {
                updateSeatStatus(response.occupied, true);
            }
        }
        else if (response.type === "OCCUPIED") {
            updateSeatStatus(response.seats, true);
        }
        else if (response.type === "RELEASED") {
            updateSeatStatus(response.seats, false);
        }
    };

    // [중요 3] 유저 구분을 포함한 상태 업데이트 로직
    function updateSeatStatus(keys, isOccupied) {
        keys.forEach(key => {
            const parts = key.split(":");
            const sId = parseInt(parts[0]);
            const seatNum = parts[1];
            const ownerId = parts[2]; // 서버가 보낸 UUID

            if (sId === scheduleId) {
                const btn = document.querySelector(`[data-seat-number="${seatNum}"]`);
                if (!btn) return;

                if (isOccupied) {
                    if (ownerId === userId) {
                        // 내가 잡은 자리는 노란색으로 유지 (새로고침 시 복구용)
                        btn.classList.add("selected");
                        btn.disabled = false;
                        if (!selectedSeats.find(s => s.seatNumber === seatNum)) {
                            selectedSeats.push({ seatNumber: seatNum });
                        }
                    } else {
                        // 남이 잡은 자리는 회색
                        btn.classList.add("occupied");
                        btn.disabled = true;
                    }
                } else {
                    // 해제 시
                    btn.classList.remove("occupied", "selected");
                    btn.disabled = false;
                    selectedSeats = selectedSeats.filter(s => s.seatNumber !== seatNum);
                }
            }
        });
    }

    // 좌석 클릭 토글
    document.querySelectorAll('.seat-btn').forEach(button => {
        button.addEventListener('click', () => {
            if (button.classList.contains('occupied')) return;

            const seatNumber = button.getAttribute('data-seat-number');
            if (selectedSeats.find(s => s.seatNumber === seatNumber)) {
                selectedSeats = selectedSeats.filter(s => s.seatNumber !== seatNumber);
                button.classList.remove("selected");
            } else {
                selectedSeats.push({ seatNumber: seatNumber });
                button.classList.add("selected");
            }
        });
    });

    // 전송 버튼
    document.getElementById('reserve-btn').addEventListener('click', () => {
        if (selectedSeats.length === 0) {
            alert("좌석을 선택해 주세요!");
            return;
        }

        const dataToSend = { scheduleId: scheduleId, seats: selectedSeats };
        socket.send(JSON.stringify(dataToSend));

        // 결제 페이지로 이동 테스트
        if(confirm("선점되었습니다. 결제 페이지로 이동하시겠습니까?")) {
            location.href = "/test-websocket/payment?scheduleId=" + scheduleId; // 이동하더라도 서버 메모리엔 남아있음
        }
    });
</script>
</body>
</html>
