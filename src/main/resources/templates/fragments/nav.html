<!DOCTYPE html>
<!--
  fragments/nav.html
  ─────────────────────────────────────────────────────────────────────────
  고객용 상단 네비게이션 fragment.
  layout/base.html 의 <header> 에서 th:replace 로 삽입됨.

  ▶ 포함 내용
  - CineOS 로고 (홈 링크)
  - 현재 상영작 탭 (UC-01)
  - 관리자 접근 버튼 (hidden 스타일, UC-11로 이동)
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>

<!-- ──────────────────────────────────────────────────────────────────────
     th:fragment="nav"
     base.html의 <header> 자리에 삽입되는 네비게이션 컴포넌트
──────────────────────────────────────────────────────────────────────── -->
<header class="site-header" th:fragment="nav">
  <div class="site-header__inner">

    <!-- ── 로고 ────────────────────────────────────────── -->
    <!-- 클릭 시 메인(상영작 목록) 화면으로 이동 -->
    <a th:href="@{/}" class="site-header__logo-link" aria-label="CineOS 홈으로 이동">
      <img th:src="@{/images/logo_cineos.svg}"
           src="/images/logo_cineos.svg"
           alt="CineOS" class="site-header__logo">
    </a>

    <!-- ── 고객 탭 네비게이션 ──────────────────────────── -->
    <!--
      현재 활성 탭은 각 페이지 컨트롤러에서
      모델에 activeTab 변수를 담아 전달:
        e.g. model.addAttribute("activeTab", "movies");
      탭 활성화 클래스: class="nav-tab nav-tab--active"
    -->
    <nav class="site-nav" aria-label="주요 메뉴">
      <ul class="nav-tab-list">

        <!--
          현재 상영작 탭 (UC-01)
          URL: /movie/list (MovieController.movieList)
          activeTab 값 'movies'를 컨트롤러가 model에 담아 전달할 때 활성 표시.
        -->
        <li class="nav-tab-list__item">
          <a th:href="@{/movie/list}"
             class="nav-tab"
             th:classappend="${activeTab == 'movies'} ? ' nav-tab--active' : ''"
             th:attr="aria-current=${activeTab == 'movies'} ? 'page' : null">
            현재 상영작
          </a>
        </li>

      </ul>
    </nav>

    <!-- ── 관리자 접근 버튼 (UC-11) ─────────────────────── -->
    <!--
      5회 연속 탭 시 /admin/login 이동 (common.js initNavAdminBtn 처리).
      직접 href 없음 — <button> 태그로 변경하여 터치 면적을 충분히 확보.
      aria-hidden/tabindex=-1 : 일반 관객의 스크린리더·키보드 탐색 노출 방지.
    -->
    <button type="button"
            id="nav-admin-btn"
            class="admin-access-btn"
            aria-hidden="true"
            tabindex="-1">

      <!-- 탭 카운트 피드백 도트 (5개 고정, common.js가 --filled 클래스 토글) -->
      <span class="admin-access-btn__dots" aria-hidden="true">
        <i class="admin-access-btn__dot"></i>
        <i class="admin-access-btn__dot"></i>
        <i class="admin-access-btn__dot"></i>
        <i class="admin-access-btn__dot"></i>
        <i class="admin-access-btn__dot"></i>
      </span>

      <!-- 버튼 레이블 -->
      <span class="admin-access-btn__label">관리</span>

    </button>

  </div>
</header>

</body>
</html>
