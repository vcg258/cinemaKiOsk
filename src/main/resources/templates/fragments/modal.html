<!DOCTYPE html>
<!--
  fragments/modal.html
  ─────────────────────────────────────────────────────────────────────────
  공용 모달 오버레이 fragment.
  base.html 및 admin-base.html 모두에서 th:replace 로 삽입됨.

  ▶ JS 사용법 (common.js의 Modal API 사용)
  ──────────────────────────────────────────
  // 기본 확인 모달
  CineOS.modal.confirm({
    title:    '좌석 선택 취소',
    message:  '선택하신 좌석을 취소하시겠습니까?',
    onConfirm: () => { ... },
    onCancel:  () => { ... }
  });

  // 정보 모달 (확인 버튼만)
  CineOS.modal.alert({
    title:   '예매 완료',
    message: '예매가 완료되었습니다.',
    onClose: () => { ... }
  });

  // 커스텀 콘텐츠 모달
  CineOS.modal.open({
    title:   '휴대폰 인증',
    content: document.getElementById('phone-verify-content').innerHTML,
  });

  // 모달 닫기
  CineOS.modal.close();
  ──────────────────────────────────────────

  ▶ HTML 구조
  - .modal-overlay: 딤 처리 배경 (클릭 시 닫기 가능)
  - .modal: 모달 박스
    - .modal__header: 제목 + 닫기 버튼
    - .modal__body: 콘텐츠 영역 (JS로 동적 주입)
    - .modal__footer: 버튼 영역 (JS로 동적 구성)
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>

<!-- ──────────────────────────────────────────────────────────────────────
     th:fragment="modal"
     공용 모달 컨테이너. 기본적으로 숨겨진 상태.
     JS(CineOS.modal)로 표시/숨김 제어.
──────────────────────────────────────────────────────────────────────── -->
<div th:fragment="modal" id="modal-container" class="modal-overlay" aria-hidden="true"
     role="dialog" aria-modal="true" aria-labelledby="modal-title">

  <!-- 딤 배경: 클릭 시 모달 닫기 (JS에서 이벤트 등록) -->
  <div class="modal-backdrop" id="modal-backdrop"></div>

  <!-- 모달 박스 -->
  <div class="modal" role="document">

    <!-- 모달 헤더 -->
    <div class="modal__header">
      <!-- 모달 제목: JS에서 동적으로 텍스트 주입 -->
      <h2 class="modal__title" id="modal-title">알림</h2>

      <!-- 닫기 버튼 (X) -->
      <button type="button"
              class="modal__close-btn"
              id="modal-close-btn"
              aria-label="모달 닫기">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="currentColor" width="24" height="24" aria-hidden="true">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5
                   17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>

    <!-- 모달 콘텐츠 영역: JS에서 innerHTML로 내용 주입 -->
    <div class="modal__body" id="modal-body">
      <!-- 동적 콘텐츠 주입 영역 -->
    </div>

    <!-- 모달 푸터: 확인/취소 버튼 영역 (JS에서 동적 구성) -->
    <div class="modal__footer" id="modal-footer">
      <!--
        기본 버튼 구성 (JS에서 상황에 따라 교체):
        - confirm 모달: 취소 + 확인 버튼
        - alert 모달:   확인 버튼만
      -->
      <!-- JS 주입 영역 -->
    </div>

  </div>
</div>

</body>
</html>
