<!DOCTYPE html>
<!--
  templates/preview/admin.html
  관리자 레이아웃 미리보기 템플릿.
  layout/admin-base.html 을 실제로 상속받아 Thymeleaf 렌더링 확인.
  접근: localhost:8080/preview/admin
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>관리자 레이아웃 미리보기 — CineOS</title>
</head>

<body>
<main>

  <div style="display:flex; flex-direction:column; gap:32px;">

    <div>
      <h1 style="font-size:1.5rem; font-weight:700; color:var(--text-primary); margin-bottom:8px;">
        관리자 대시보드
      </h1>
      <p style="color:var(--text-secondary);">
        admin-base.html 레이아웃 렌더링 확인용 페이지입니다.
      </p>
    </div>

    <!-- 통계 카드 샘플 -->
    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px;">

      <div class="card" style="padding:20px;">
        <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:8px;">오늘 예매 수</p>
        <p style="font-size:2rem; font-weight:800; color:var(--color-brand-400);">127</p>
      </div>

      <div class="card" style="padding:20px;">
        <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:8px;">오늘 매출</p>
        <p style="font-size:2rem; font-weight:800; color:var(--color-success-main);">1,905,000원</p>
      </div>

      <div class="card" style="padding:20px;">
        <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:8px;">환불 건수</p>
        <p style="font-size:2rem; font-weight:800; color:var(--color-error-main);">3</p>
      </div>

    </div>

    <!-- 버튼 확인 -->
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <button class="btn btn--primary">저장</button>
      <button class="btn btn--ghost">취소</button>
      <button class="btn btn--danger">삭제</button>
    </div>

  </div>

</main>
</body>
</html>
