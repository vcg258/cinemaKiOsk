<!DOCTYPE html>
<!--
  templates/admin/theater/edit.html
  ─────────────────────────────────────────────────────────────────────────
  UC-21: 상영관 정보 수정 (관리자용)

  ▶ 기능 요약
    - 상영관 목록 선택 → 해당 상영관 정보 표시
    - 기본 정리 시간, 좌석 정보(요금, 리클라이너 여부) 수정
    - 진행 중 예매 있을 경우 변동 사항 안내 메시지

  ▶ Controller → View 전달 Model 속성
    - theaters    : List<TheaterDTO>      전체 상영관 목록 (선택 드롭다운용)
                    └ no, name, cost, cleanupTime
    - theater     : TheaterDTO            현재 선택된 상영관 정보 (기본: 첫 번째)
    - seatPolicies: List<SeatPolicyDTO>   좌석 정책 목록
                    └ policyId, name, cost
    - hasActiveReservation : Boolean      진행 중 예매 여부

  ▶ 파일 위치
    templates/admin/theater/edit.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>상영관 관리 | CineOS 관리자</title>
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       TODO: UC-21 상영관 정보 수정 구현
       ─────────────────────────────────────────────────────────────────
       구현 항목:
         [ ] 상영관 선택 드롭다운
               th:each="t : ${theaters}"
               선택 변경 시 JS로 해당 상영관 정보 로드 또는 폼 제출
         [ ] 진행 중 예매 있을 때 안내 배너
               th:if="${hasActiveReservation}"
               "현재 진행 중인 예매가 있습니다. 수정 내용은 기존 예매에 영향을 줄 수 있습니다."
         [ ] 기본 정리 시간 수정 (분 단위)
               th:value="${theater.cleanupTime}"
         [ ] 좌석 구성 편집기
               seatPolicies 기반으로 좌석 유형별 요금 / 리클라이너 여부 수정
               th:each="policy : ${seatPolicies}"
               policyId / name / cost 입력
         [ ] '저장' 버튼 → PUT /api/admin/theater/{no}
         [ ] '취소' 버튼 (변경사항 초기화)
  ══════════════════════════════════════════════════════════════════ -->
  <div class="admin-placeholder">
    <p>UC-21 상영관 정보 수정 — 구현 예정</p>
  </div>

  <script th:src="@{/js/admin/theater.js}" th:if="${false}"></script>

</main>
</body>
</html>
