<!DOCTYPE html>
<!--
  templates/admin/movie/manage.html
  ─────────────────────────────────────────────────────────────────────────
  UC-20: 영화 삭제 (상영 중지) / 영화 목록 관리 (관리자용)

  ▶ 기능 요약
    - 등록된 영화 목록 표시
    - 각 영화에 '수정' → UC-19 폼 이동 / '상영 중지' 버튼
    - 상영 중지: 확인 다이얼로그 → 익일 00시부터 목록 제외 + 잔여 예매 100% 환불
    - '새 영화 등록' 버튼 → UC-18 폼 이동

  ▶ Controller → View 전달 Model 속성
    - movies : List<MovieDTO>  전체 영화 목록 (상영 중 + 상영 예정 + 종료)
               └ movieId, title, genre, rating, startAt, endAt

  ▶ 에러 메시지 (명세 기준 — 임의 변경 금지)
    - 상영 중지 확인 다이얼로그:
      "오늘까지 상영 후 익일 00시부터는 상영 목록에서 제외됩니다.
       정말 상영 종료 하시겠습니까?"

  ▶ 파일 위치
    templates/admin/movie/manage.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>영화 관리 | CineOS 관리자</title>
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       TODO: UC-20 영화 관리 목록 구현
       ─────────────────────────────────────────────────────────────────
       구현 항목:
         [ ] '새 영화 등록' 버튼 → th:href="@{/admin/movie/form}"
         [ ] 영화 목록 테이블
               th:each="movie : ${movies}"
               컬럼: 제목 / 장르 / 등급 / 상영 기간 / 상태 / 수정 / 상영 중지
         [ ] '수정' 버튼 → th:href="@{/admin/movie/form(movieId=${movie.movieId})}"
         [ ] '상영 중지' 버튼 → 확인 모달 오픈
               확인 클릭 → PATCH /api/admin/movie/{movieId}/stop
               모달 메시지:
               "오늘까지 상영 후 익일 00시부터는 상영 목록에서 제외됩니다.
                정말 상영 종료 하시겠습니까?"
         [ ] 예매가 존재하는 영화 즉시 삭제 불가 → 상영 종료 후 처리 안내
  ══════════════════════════════════════════════════════════════════ -->
  <div class="admin-placeholder">
    <p>UC-20 영화 관리 — 구현 예정</p>
    <a th:href="@{/admin/movie/form}" class="btn btn--primary">+ 새 영화 등록</a>
  </div>

  <script th:src="@{/js/admin/movie-form.js}" th:if="${false}"></script>

</main>
</body>
</html>
