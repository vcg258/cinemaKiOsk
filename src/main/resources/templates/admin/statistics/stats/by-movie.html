<!DOCTYPE html>
<!--
  templates/admin/statistics/stats/by-movie.html
  UC-16: 통계 확인 (영화별)
  Model: movies(List<MovieDTO>), statistics(List<StatisticsDTO>),
         selectedMovie(MovieDTO) — 기본: 최신 등록 영화
-->
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <meta charset="UTF-8">
  <title>영화별 통계 | CineOS 관리자</title>
</head>

<body>
<main>

  <div class="admin-page-header">
    <h1 class="admin-page-header__title">영화별 통계</h1>
    <p class="admin-page-header__subtitle">영화별 매출 및 관람객 현황</p>
  </div>

  <script th:inline="javascript">
    const STAT_TYPE = 'by-movie';
    const STAT_DATA = /*[[${statistics}]]*/ [];
    /* 현재 선택된 영화 ID — 영화 변경 select 이벤트 시 사용 */
    const SELECTED_MOVIE_ID = /*[[${selectedMovie?.movieId}]]*/ null;
  </script>

  <!-- 영화 선택 드롭다운 -->
  <div class="admin-date-filter">
    <div class="admin-date-filter__group">
      <label for="movieSelect" class="admin-date-filter__label">영화 선택</label>
      <select id="movieSelect" class="admin-date-filter__input input"
              onchange="fetchAndRenderStats(null, null, this.value)">
        <option th:each="movie : ${movies}"
                th:value="${movie.movieId}"
                th:text="${movie.title}"
                th:selected="${movie.movieId == selectedMovie?.movieId}">
          영화 제목
        </option>
      </select>
    </div>
  </div>

  <!-- 차트 -->
  <div class="admin-chart-card">
    <div class="admin-chart-card__header">
      <h2 class="admin-chart-card__title"
          th:text="${selectedMovie?.title + ' — 일별 추이'}">영화별 추이</h2>
    </div>
    <div class="admin-chart-wrap">
      <canvas id="statsChart" aria-label="영화별 통계 차트" role="img"></canvas>
    </div>
  </div>

  <!-- 통계 테이블 -->
  <div class="admin-table-wrap">
    <table class="admin-data-table" id="statsTable">
      <thead>
        <tr>
          <th>날짜</th>
          <th>수익 (원)</th>
          <th>관람객 (명)</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="stat : ${statistics}">
          <td th:text="${stat.scheduleId}">-</td>
          <td th:text="${#numbers.formatInteger(stat.revenue, 0, 'COMMA')}">0</td>
          <td th:text="${stat.customerCount}">0</td>
        </tr>
        <tr th:if="${#lists.isEmpty(statistics)}">
          <td colspan="3" class="admin-data-table__empty">조회된 데이터가 없습니다.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script th:src="@{/js/admin/stats.js}"></script>

</main>
</body>
</html>
