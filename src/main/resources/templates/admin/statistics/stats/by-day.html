<!DOCTYPE html>
<!--
  templates/admin/statistics/stats/by-day.html
  UC-14: 통계 확인 (요일별)
  Model: statistics(List<StatisticsDTO>), startDate, endDate
  StatisticsDTO.day: SUN / MON / TUE / WED / THU / FRI / SAT
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>요일별 통계 | CineOS 관리자</title>
</head>

<body>
<main>

  <div class="admin-page-header">
    <h1 class="admin-page-header__title">요일별 통계</h1>
    <p class="admin-page-header__subtitle">요일별 매출 및 관람객 현황</p>
  </div>

  <script th:inline="javascript">
    const STAT_TYPE = 'by-day';
    const STAT_DATA = /*[[${statistics}]]*/ [];
    /* 요일 한글 매핑 — stats.js에서 X축 레이블에 사용 */
    const DAY_LABELS = { SUN: '일', MON: '월', TUE: '화', WED: '수', THU: '목', FRI: '금', SAT: '토' };
  </script>

  <!-- 날짜 범위 필터 -->
  <div class="admin-date-filter">
    <div class="admin-date-filter__group">
      <label for="startDate" class="admin-date-filter__label">시작일</label>
      <input type="date" id="startDate" class="admin-date-filter__input input"
             th:value="${startDate}">
    </div>
    <span class="admin-date-filter__sep">~</span>
    <div class="admin-date-filter__group">
      <label for="endDate" class="admin-date-filter__label">종료일</label>
      <input type="date" id="endDate" class="admin-date-filter__input input"
             th:value="${endDate}">
    </div>
    <button type="button" class="btn btn--primary admin-date-filter__btn"
            onclick="fetchAndRenderStats(
              document.getElementById('startDate').value,
              document.getElementById('endDate').value
            )">
      조회
    </button>
  </div>

  <!-- 차트 (X축: 일~토) -->
  <div class="admin-chart-card">
    <div class="admin-chart-card__header">
      <h2 class="admin-chart-card__title">요일별 추이</h2>
    </div>
    <div class="admin-chart-wrap">
      <canvas id="statsChart" aria-label="요일별 통계 차트" role="img"></canvas>
    </div>
  </div>

  <!-- 통계 테이블 -->
  <div class="admin-table-wrap">
    <table class="admin-data-table" id="statsTable">
      <thead>
        <tr>
          <th>요일</th>
          <th>수익 (원)</th>
          <th>관람객 (명)</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="stat : ${statistics}">
          <!--
            day 값 한글 변환:
            SUN→일, MON→월, TUE→화, WED→수, THU→목, FRI→금, SAT→토
          -->
          <td th:switch="${stat.day}">
            <span th:case="'SUN'">일</span>
            <span th:case="'MON'">월</span>
            <span th:case="'TUE'">화</span>
            <span th:case="'WED'">수</span>
            <span th:case="'THU'">목</span>
            <span th:case="'FRI'">금</span>
            <span th:case="'SAT'">토</span>
            <span th:case="*" th:text="${stat.day}">-</span>
          </td>
          <td th:text="${#numbers.formatInteger(stat.revenue, 0, 'COMMA')}">0</td>
          <td th:text="${stat.customerCount}">0</td>
        </tr>
        <tr th:if="${#lists.isEmpty(statistics)}">
          <td colspan="3" class="admin-data-table__empty">조회된 데이터가 없습니다.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script th:src="@{/js/admin/stats.js}"></script>

</main>
</body>
</html>
