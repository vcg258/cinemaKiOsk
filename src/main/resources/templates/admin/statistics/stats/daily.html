<!DOCTYPE html>
<!--
  templates/admin/statistics/stats/daily.html
  UC-12: 통계 확인 (일일)
  Model: statistics(List<StatisticsDTO>), startDate(String), endDate(String)
  StatisticsDTO: id, scheduleId, day, revenue, customerCount
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>일일 통계 | CineOS 관리자</title>
</head>

<body>
<main>

  <!-- 페이지 헤더 -->
  <div class="admin-page-header">
    <h1 class="admin-page-header__title">일일 통계</h1>
    <p class="admin-page-header__subtitle">일별 매출 및 관람객 현황</p>
  </div>

  <!-- STAT_TYPE: stats.js에서 차트 타입 분기에 사용 -->
  <script th:inline="javascript">
    const STAT_TYPE = 'daily';
    /* 서버에서 내려온 통계 데이터 — JS로 차트 렌더링 시 사용 */
    const STAT_DATA = /*[[${statistics}]]*/ [];
  </script>

  <!-- 날짜 범위 필터 -->
  <div class="admin-date-filter">
    <div class="admin-date-filter__group">
      <label for="startDate" class="admin-date-filter__label">시작일</label>
      <input type="date" id="startDate" class="admin-date-filter__input input"
             th:value="${startDate}">
    </div>
    <span class="admin-date-filter__sep">~</span>
    <div class="admin-date-filter__group">
      <label for="endDate" class="admin-date-filter__label">종료일</label>
      <input type="date" id="endDate" class="admin-date-filter__input input"
             th:value="${endDate}">
    </div>
    <button type="button" class="btn btn--primary admin-date-filter__btn"
            onclick="fetchAndRenderStats(
              document.getElementById('startDate').value,
              document.getElementById('endDate').value
            )">
      조회
    </button>
  </div>

  <!-- 차트 영역 -->
  <div class="admin-chart-card">
    <div class="admin-chart-card__header">
      <h2 class="admin-chart-card__title">일별 추이</h2>
    </div>
    <div class="admin-chart-wrap">
      <!-- Chart.js 캔버스 — stats.js에서 renderChart()로 그림 -->
      <canvas id="statsChart" aria-label="일일 통계 차트" role="img"></canvas>
    </div>
  </div>

  <!-- 통계 테이블 -->
  <div class="admin-table-wrap">
    <table class="admin-data-table" id="statsTable">
      <thead>
        <tr>
          <th>날짜</th>
          <th>수익 (원)</th>
          <th>관람객 (명)</th>
        </tr>
      </thead>
      <tbody>
        <!-- SSR: 초기 데이터 렌더링 -->
        <tr th:each="stat : ${statistics}">
          <td th:text="${stat.scheduleId}">-</td>
          <td th:text="${#numbers.formatInteger(stat.revenue, 0, 'COMMA')}">0</td>
          <td th:text="${stat.customerCount}">0</td>
        </tr>
        <!-- 데이터 없을 때 안내 행 -->
        <tr th:if="${#lists.isEmpty(statistics)}">
          <td colspan="3" class="admin-data-table__empty">조회된 데이터가 없습니다.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- 페이지 전용 JS -->
  <script th:src="@{/js/admin/stats.js}"></script>

</main>
</body>
</html>
