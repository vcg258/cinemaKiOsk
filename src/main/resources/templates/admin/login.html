<!DOCTYPE html>
<!--
  templates/admin/login.html
  ─────────────────────────────────────────────────────────────────────────
  UC-11: 관리자 로그인 (관리자용)
  ※ 로그인 페이지는 admin-base.html 사용 안 함 (헤더/사이드바 불필요)

  ▶ 기능 요약
    - 아이디 + 비밀번호 입력 후 로그인
    - 실패 시 경고창 표시

  ▶ Controller → View 전달 Model 속성
    - loginError : Boolean   로그인 실패 시 true (Spring Security 리다이렉트 파라미터)
                             th:if="${loginError}" 로 경고 메시지 표시

  ▶ 에러 메시지 (명세 기준 — 임의 변경 금지)
    - 로그인 실패: 경고창 표시 (alert 또는 인라인 메시지)

  ▶ 연결 UC
    → 로그인 성공: /admin/dashboard 으로 이동

  ▶ 파일 위치
    templates/admin/login.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 | CineOS</title>
  <link rel="stylesheet" th:href="@{/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body class="admin-body admin-login-body">

  <!-- ══════════════════════════════════════════════════════════════════
       TODO: UC-11 관리자 로그인 콘텐츠 구현
       ─────────────────────────────────────────────────────────────────
       구현 항목:
         [ ] 로고 이미지 + "관리자" 타이틀
         [ ] 로그인 폼 (Spring Security 기본 URL 사용 권장: POST /admin/login)
               - 아이디 입력 필드: name="loginId"  (AdminVO.loginId)
               - 비밀번호 입력 필드: name="password" (AdminVO.password)
               - CSRF 토큰: th:if="${_csrf != null}"
         [ ] 로그인 실패 메시지
               th:if="${loginError}" → 경고창 또는 인라인 메시지
               "아이디 또는 비밀번호가 올바르지 않습니다."
         [ ] '로그인' 버튼 (submit)
  ══════════════════════════════════════════════════════════════════ -->

  <main class="admin-login-container">
    <div class="admin-placeholder">
      <p>UC-11 관리자 로그인 — 구현 예정</p>
    </div>
  </main>

</body>
</html>
