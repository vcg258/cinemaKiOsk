<!DOCTYPE html>
<!--
  templates/admin/management/policy/manage.html
  정책 수정 (UC 명세 외 팀 합의)
  URL 파라미터: ?type=bonus|discount &id={id}
  Model: policyType(String), bonusPolicy(BonusPolicyDTO), discountPolicyEntity(DiscountPolicyDTO)
  BonusPolicyDTO: id, policyName, giveValue
  DiscountPolicyDTO: id, policyName, discountType, discountValue, conditionType
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>정책 수정 | CineOS 관리자</title>
</head>

<body>
<main>

  <!-- 페이지 헤더 -->
  <div class="admin-page-header">
    <h1 class="admin-page-header__title">정책 수정</h1>
    <p class="admin-page-header__subtitle"
       th:text="${policyType == 'bonus'} ? '적립 정책 수정' : '할인 정책 수정'">
    </p>
  </div>

  <div class="admin-form-card">

    <!-- 정책 유형 표시 (수정 불가 읽기 전용) -->
    <div class="admin-form-group">
      <label class="admin-form-label">정책 유형</label>
      <input type="text" class="input" readonly
             th:value="${policyType == 'bonus'} ? '적립 정책' : '할인 정책'">
    </div>

    <!-- 공통: 정책명 -->
    <div class="admin-form-group">
      <label for="policyName" class="admin-form-label admin-form-label--required">정책명</label>
      <input type="text" id="policyName" class="input"
             th:value="${policyType == 'bonus'} ? ${bonusPolicy?.policyName} : ${discountPolicyEntity?.policyName}"
             required>
    </div>

    <!-- ── 적립 정책 수정 필드 ─────────────── -->
    <div th:if="${policyType == 'bonus'}">
      <div class="admin-form-group">
        <label for="giveValue" class="admin-form-label admin-form-label--required">
          적립 비율 (%)
        </label>
        <input type="number" id="giveValue" class="input"
               th:value="${bonusPolicy?.giveValue}"
               min="0" max="100" step="0.1">
      </div>
      <!-- 히든: 적립 정책 ID -->
      <input type="hidden" id="policyId" th:value="${bonusPolicy?.id}">
    </div>

    <!-- ── 할인 정책 수정 필드 ─────────────── -->
    <div th:if="${policyType == 'discount'}">
      <div class="admin-form-group">
        <label for="discountType" class="admin-form-label admin-form-label--required">
          할인 유형
        </label>
        <select id="discountType" class="input">
          <option value="RATIO" th:selected="${discountPolicyEntity?.discountType == 'RATIO'}">비율 (%)</option>
          <option value="WON"   th:selected="${discountPolicyEntity?.discountType == 'WON'}">금액 (원)</option>
        </select>
      </div>
      <div class="admin-form-group">
        <label for="discountValue" class="admin-form-label admin-form-label--required">
          할인값
        </label>
        <input type="number" id="discountValue" class="input"
               th:value="${discountPolicyEntity?.discountValue}"
               min="0">
      </div>
      <div class="admin-form-group">
        <label for="conditionType" class="admin-form-label admin-form-label--required">
          적용 조건
        </label>
        <select id="conditionType" class="input">
          <option value="TIME" th:selected="${discountPolicyEntity?.conditionType == 'TIME'}">시간</option>
          <option value="AGE"  th:selected="${discountPolicyEntity?.conditionType == 'AGE'}">나이</option>
          <option value="JOB"  th:selected="${discountPolicyEntity?.conditionType == 'JOB'}">직업</option>
        </select>
      </div>
      <!-- 히든: 할인 정책 ID -->
      <input type="hidden" id="policyId" th:value="${discountPolicyEntity?.id}">
    </div>

    <!-- 폼 액션 -->
    <div class="admin-form-actions">
      <a th:href="@{/admin/management/policy/list}" class="btn btn--ghost">
        취소
      </a>
      <button type="button" class="btn btn--primary"
              onclick="submitPolicyUpdate()">
        저장
      </button>
    </div>

  </div>

  <!-- 페이지 전용 인라인 스크립트 -->
  <script th:inline="javascript">
    /* 현재 정책 유형 — 저장 시 API 분기에 사용 */
    const POLICY_TYPE = /*[[${policyType}]]*/ 'bonus';

    /**
     * 정책 수정 저장 — PUT /api/admin/policy/{type}/{id}
     */
    async function submitPolicyUpdate() {
      const policyId   = document.getElementById('policyId').value;
      const policyName = document.getElementById('policyName').value.trim();

      if (!policyName) {
        CineOS.alert.error('정책명을 입력해 주세요.');
        return;
      }

      let body;

      if (POLICY_TYPE === 'bonus') {
        const giveValue = parseFloat(document.getElementById('giveValue').value);
        if (isNaN(giveValue)) {
          CineOS.alert.error('적립 비율을 입력해 주세요.');
          return;
        }
        body = { policyName, giveValue };

      } else {
        const discountType  = document.getElementById('discountType').value;
        const discountValue = parseFloat(document.getElementById('discountValue').value);
        const conditionType = document.getElementById('conditionType').value;

        if (isNaN(discountValue)) {
          CineOS.alert.error('할인값을 입력해 주세요.');
          return;
        }
        body = { policyName, discountType, discountValue, conditionType };
      }

      try {
        await CineOS.api.put('/api/admin/policy/' + POLICY_TYPE + '/' + policyId, body);
        CineOS.alert.success('정책이 수정되었습니다.');
        setTimeout(() => window.location.href = '/admin/management/policy/list', 800);
      } catch (err) {
        CineOS.alert.error(err.message || '수정에 실패하였습니다.');
      }
    }
  </script>

</main>
</body>
</html>
