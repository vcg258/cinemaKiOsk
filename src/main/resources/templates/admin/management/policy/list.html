<!DOCTYPE html>
<!--
  templates/admin/management/policy/list.html
  ─────────────────────────────────────────────────────────────────────────
  정책 목록 (관리자용)
  ※ UC 명세 외 팀 합의로 추가된 페이지
  ※ 적립 정책(BonusPolicy) + 할인 정책(DiscountPolicy) 통합 관리

  ▶ 기능 요약
    - 등록된 적립 정책·할인 정책 목록 조회
    - 정책 등록·수정 페이지로 이동

  ▶ Controller → View 전달 Model 속성
    - bonusPolicies    : List<BonusPolicyDTO>
                         └ id, policyName, giveValue(적립 비율)
    - discountPolicies : List<DiscountPolicyDTO>
                         └ id, policyName, discountType(RATIO/WON),
                           discountValue, conditionType(TIME/AGE/JOB)

  ▶ 연결 페이지
    → admin/management/policy/form.html   (정책 등록)
    → admin/management/policy/manage.html (정책 수정)

  ▶ 파일 위치
    templates/admin/management/policy/list.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>정책 목록 | CineOS 관리자</title>
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       TODO: 정책 목록 구현
       ─────────────────────────────────────────────────────────────────
       구현 항목:
         [ ] 탭 또는 섹션으로 적립 정책 / 할인 정책 구분 표시

         [ ] 적립 정책 목록
               th:each="policy : ${bonusPolicies}"
               policyName / giveValue(%) 표시
               '수정' 버튼 → /admin/management/policy/manage?type=bonus&id={policy.id}
               '삭제' 버튼 → DELETE /api/admin/policy/bonus/{id}

         [ ] 할인 정책 목록
               th:each="policy : ${discountPolicies}"
               policyName / discountType / discountValue / conditionType 표시
               '수정' 버튼 → /admin/management/policy/manage?type=discount&id={policy.id}
               '삭제' 버튼 → DELETE /api/admin/policy/discount/{id}

         [ ] '정책 등록' 버튼 → /admin/management/policy/form
  ══════════════════════════════════════════════════════════════════ -->

  <div class="admin-placeholder">
    <p>정책 목록 — 구현 예정</p>
    <a th:href="@{/admin/management/policy/form}" class="btn btn--primary">정책 등록</a>
  </div>

</main>
</body>
</html>
