<!DOCTYPE html>
<!--
  templates/admin/management/movie/list.html
  ─────────────────────────────────────────────────────────────────────────
  영화 목록 (관리자용 진입점)
  UC-18~20 관련 작업의 시작 화면

  ▶ 기능 요약
    - 등록된 전체 영화 목록 표시 (상영 중 / 상영 예정 / 상영 종료)
    - '새 영화 등록' 버튼 → UC-18 폼 이동
    - 각 항목에 '수정' → UC-19 폼 이동 / '상영 관리' → UC-20 이동

  ▶ Controller → View 전달 Model 속성
    - movies : List<MovieDTO>  전체 영화 목록
               └ movieId, title, genre, rating, startAt, endAt

  ▶ 파일 위치
    templates/admin/management/movie/list.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>영화 목록 | CineOS 관리자</title>
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       페이지 헤더: 제목 + 새 영화 등록 버튼
  ══════════════════════════════════════════════════════════════════ -->
  <div class="admin-page-header">
    <div>
      <h1 class="admin-page-title">영화 목록</h1>
      <p class="admin-page-subtitle">등록된 전체 영화를 조회하고 관리합니다.</p>
    </div>
    <!-- UC-18: 영화 등록 폼으로 이동 -->
    <a th:href="@{/admin/management/movie/form}" class="btn btn--primary">
      + 새 영화 등록
    </a>
  </div>

  <div class="admin-table-wrap">
    <table class="admin-data-table">
      <thead>
        <tr>
          <th>포스터</th>
          <th>제목</th>
          <th>장르</th>
          <th>등급</th>
          <th>상영 기간</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody>

        <!-- 데이터 없을 때 안내 행 -->
        <tr th:if="${movies == null or #lists.isEmpty(movies)}">
          <td colspan="7" style="text-align:center; padding: 3rem; color: var(--text-muted);">
            등록된 영화가 없습니다.
          </td>
        </tr>

        <!--
          영화 목록 행 반복.

          th:with 로 상태 값을 미리 계산해 td 안에서 반복 사용.
            now          : 현재 LocalDateTime
            movieStatus  : 'ENDED' / 'UPCOMING' / 'NOW'
              - endAt < now   → 'ENDED'   (상영 종료)
              - startAt > now → 'UPCOMING'(상영 예정)
              - 그 외          → 'NOW'    (상영 중)
        -->
        <tr th:each="movie : ${movies}"
            th:with="now=${#temporals.createNow()},
                     movieStatus=${movie.endAt != null and movie.endAt.isBefore(now)}
                                 ? 'ENDED'
                                 : (${movie.startAt != null and movie.startAt.isAfter(now)}
                                   ? 'UPCOMING'
                                   : 'NOW')">

          <!-- 포스터 썸네일 -->
          <td>
            <!--
              TODO: 백엔드 파일 서빙 엔드포인트 확정 후 th:src URL 수정.
                    현재는 /api/file/{movieId} 로 임시 설정.
            -->
            <img th:src="@{/api/file/{id}(id=${movie.movieId})}"
                 src="/images/placeholder-poster.jpg"
                 alt="포스터"
                 style="height:60px; width:42px; object-fit:cover; border-radius:4px;"
                 onerror="this.src='/images/placeholder-poster.jpg'">
          </td>

          <!-- 영화 제목 -->
          <td th:text="${movie.title}">영화 제목</td>

          <!-- 장르 -->
          <td th:text="${movie.genre}">장르</td>

          <!-- 관람 등급 배지 -->
          <td>
            <span class="badge badge--sm"
                  th:classappend="${movie.rating == 'ALL'     ? 'badge--all' :
                                   movie.rating == '12'      ? 'badge--12'  :
                                   movie.rating == 'TWELVE'  ? 'badge--12'  :
                                   movie.rating == '15'      ? 'badge--15'  :
                                   movie.rating == 'FIFTEEN' ? 'badge--15'  :
                                   movie.rating == '19'      ? 'badge--18'  :
                                   movie.rating == 'NINETEEN'? 'badge--18'  : ''}"
                  th:text="${movie.rating == 'ALL'      ? '전체관람가'    :
                            movie.rating == '12'        ? '12세'          :
                            movie.rating == 'TWELVE'    ? '12세'          :
                            movie.rating == '15'        ? '15세'          :
                            movie.rating == 'FIFTEEN'   ? '15세'          :
                            movie.rating == '19'        ? '청소년관람불가' :
                            movie.rating == 'NINETEEN'  ? '청소년관람불가' : movie.rating}">
              등급
            </span>
          </td>

          <!-- 상영 기간 (startAt ~ endAt) -->
          <td>
            <span th:text="${#temporals.format(movie.startAt, 'yyyy.MM.dd')}">-</span>
            &nbsp;~&nbsp;
            <span th:text="${#temporals.format(movie.endAt, 'yyyy.MM.dd')}">-</span>
          </td>

          <!-- 상태 배지: movieStatus 기준으로 색상·텍스트 분기 -->
          <td>
            <span class="badge badge--sm"
                  th:classappend="${movieStatus == 'ENDED'}    ? 'badge--muted'   :
                                  (${movieStatus == 'UPCOMING'} ? 'badge--info'    : 'badge--success')"
                  th:text="${movieStatus == 'ENDED'}    ? '상영 종료' :
                            (${movieStatus == 'UPCOMING'} ? '상영 예정'  : '상영 중')">
              상태
            </span>
          </td>

          <!-- 관리 버튼 -->
          <td class="admin-data-table__actions">
            <!-- UC-19: 영화 수정 폼으로 이동 -->
            <a th:href="@{/admin/management/movie/form(movieId=${movie.movieId})}"
               class="btn btn--sm btn--ghost">수정</a>
            <!-- UC-20: 상영 관리(종료 처리) 페이지로 이동 -->
            <a th:href="@{/admin/management/movie/manage(movieId=${movie.movieId})}"
               class="btn btn--sm btn--outline-danger">상영 관리</a>
          </td>

        </tr>

      </tbody>
    </table>
  </div>

</main>
</body>
</html>
