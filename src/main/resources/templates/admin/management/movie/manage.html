<!DOCTYPE html>
<!--
  templates/admin/management/movie/manage.html
  UC-20: 영화 삭제(상영 중지) / 영화 목록 관리
  Model: movies(List<MovieDTO>)
  MovieDTO: movieId, title, genre, rating, startAt, endAt
  상영 중지 확인 메시지(명세 고정):
    "오늘까지 상영 후 익일 00시부터는 상영 목록에서 제외됩니다.
     정말 상영 종료 하시겠습니까?"
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>영화 관리 | CineOS 관리자</title>
</head>

<body>
<main>

  <!-- 페이지 헤더 + 신규 등록 버튼 -->
  <div class="admin-page-header">
    <h1 class="admin-page-header__title">영화 관리</h1>
    <a th:href="@{/admin/management/movie/form}" class="btn btn--primary">
      + 새 영화 등록
    </a>
  </div>

  <!-- 영화 목록 테이블 -->
  <div class="admin-table-wrap">
    <table class="admin-data-table">
      <thead>
        <tr>
          <th>제목</th>
          <th>장르</th>
          <th>등급</th>
          <th>상영 기간</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody>

        <!-- 영화 목록 반복 -->
        <tr th:each="movie : ${movies}">
          <td th:text="${movie.title}">영화 제목</td>
          <td th:text="${movie.genre}">장르</td>

          <!-- 관람 등급 배지 -->
          <td>
            <span th:switch="${movie.rating}">
              <span th:case="'ALL'" class="badge badge--all">전체</span>
              <span th:case="'12'"  class="badge badge--12">12</span>
              <span th:case="'15'"  class="badge badge--15">15</span>
              <span th:case="'19'"  class="badge badge--18">19</span>
              <span th:case="*"     th:text="${movie.rating}">-</span>
            </span>
          </td>

          <!-- 상영 기간 -->
          <td th:text="${movie.startAt + ' ~ ' + movie.endAt}">-</td>

          <!-- 상영 상태 (현재 날짜 기준) — JS 또는 백엔드에서 처리 -->
          <td>
            <span class="admin-status-badge" th:attr="data-movie-id=${movie.movieId}">
              확인 중
            </span>
          </td>

          <!-- 관리 버튼 -->
          <td class="admin-data-table__actions">
            <!-- 수정 버튼 → UC-19 영화 수정 폼으로 이동 -->
            <a th:href="@{/admin/management/movie/form(movieId=${movie.movieId})}"
               class="btn btn--ghost btn--sm">
              수정
            </a>
            <!-- 상영 중지 버튼 → 확인 모달 후 PATCH API 호출 -->
            <button type="button"
                    class="btn btn--danger btn--sm"
                    th:attr="data-movie-id=${movie.movieId},
                             data-title=${movie.title}"
                    onclick="confirmStop(this)">
              상영 중지
            </button>
          </td>
        </tr>

        <!-- 목록 없을 때 -->
        <tr th:if="${#lists.isEmpty(movies)}">
          <td colspan="6" class="admin-data-table__empty">
            등록된 영화가 없습니다.
          </td>
        </tr>

      </tbody>
    </table>
  </div>

  <script>
    /**
     * 상영 중지 확인 모달 → PATCH /api/admin/movie/{movieId}/stop 호출
     * @param {HTMLElement} btn - 클릭된 버튼 (data-movie-id, data-title 포함)
     */
    async function confirmStop(btn) {
      const movieId = btn.getAttribute('data-movie-id');
      const title   = btn.getAttribute('data-title');

      /* 명세 고정 확인 메시지 */
      const confirmed = await CineOS.modal.confirm(
        '상영 중지 확인',
        '오늘까지 상영 후 익일 00시부터는 상영 목록에서 제외됩니다.\n정말 상영 종료 하시겠습니까?'
      );
      if (!confirmed) return;

      try {
        /* 상영 중지 API 호출 */
        await CineOS.api.patch('/api/admin/movie/' + movieId + '/stop');
        CineOS.alert.success('《' + title + '》 상영 중지 처리되었습니다.');
        /* 목록 새로고침 */
        setTimeout(() => location.reload(), 1000);

      } catch (err) {
        CineOS.alert.error(err.message || '상영 중지 처리에 실패하였습니다.');
      }
    }
  </script>

</main>
</body>
</html>
