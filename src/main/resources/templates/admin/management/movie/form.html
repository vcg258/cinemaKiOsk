<!DOCTYPE html>
<!--
  templates/admin/management/movie/form.html
  UC-18 영화 등록 / UC-19 영화 수정 (movie=null 이면 신규, 있으면 수정)
  Model: movie(MovieDTO, nullable), theaters(List<TheaterDTO>)
  MovieDTO: movieId, title, genre, rating(ALL/12/15/19), runtime, director,
            actor, description, startAt, endAt
  TheaterDTO: no, name, cost, cleanupTime
-->
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <meta charset="UTF-8">
  <title th:text="${movie != null} ? '영화 수정 | CineOS 관리자' : '영화 등록 | CineOS 관리자'">
    영화 등록/수정 | CineOS 관리자
  </title>
</head>

<body>
<main>

  <!-- 페이지 헤더 -->
  <div class="admin-page-header">
    <h1 class="admin-page-header__title"
        th:text="${movie != null} ? '영화 수정' : '영화 등록'">
      영화 등록
    </h1>
    <p class="admin-page-header__subtitle"
       th:text="${movie != null} ? '영화 정보를 수정합니다.' : '새 영화를 등록합니다.'">
    </p>
  </div>

  <!--
    URL 에러 파라미터 표시 영역
    movie-form.js → checkUrlError()가 ?error= 파라미터 읽어서 이 영역에 표시
  -->
  <div id="formErrorMsg" class="admin-error-msg" hidden></div>

  <!-- 영화 등록/수정 폼 -->
  <div class="admin-form-card">
    <form id="movieForm" autocomplete="off">

      <!-- 수정 시 movieId 히든 필드 -->
      <input type="hidden" id="movieId"
             th:value="${movie?.movieId}">

      <!-- ── 포스터 업로드 ───────────────────── -->
      <div class="admin-form-group">
        <label class="admin-form-label">포스터 이미지</label>
        <div class="admin-poster-upload">
          <!-- 이미지 미리보기 (movie-form.js → initPosterPreview()) -->
          <img id="posterPreview"
               th:src="${movie?.posterUrl}"
               src=""
               alt="포스터 미리보기"
               class="admin-poster-preview"
               th:classappend="${movie?.posterUrl == null} ? 'is-hidden' : ''">
          <label for="posterFile" class="btn btn--ghost admin-poster-label">
            이미지 선택
          </label>
          <input type="file" id="posterFile" name="posterFile"
                 accept="image/*"
                 class="admin-poster-file-input"
                 onchange="initPosterPreview(this)">
          <p class="admin-form-hint">JPG, PNG, WEBP / 최대 10MB</p>
        </div>
      </div>

      <!-- ── 기본 정보 ───────────────────────── -->
      <div class="admin-form-group">
        <label for="title" class="admin-form-label admin-form-label--required">영화 제목</label>
        <input type="text" id="title" name="title" class="input"
               placeholder="영화 제목을 입력하세요"
               th:value="${movie?.title}"
               required>
      </div>

      <div class="admin-form-group">
        <label for="genre" class="admin-form-label admin-form-label--required">장르</label>
        <input type="text" id="genre" name="genre" class="input"
               placeholder="예: 액션, 로맨스, 공포"
               th:value="${movie?.genre}"
               required>
      </div>

      <!-- 관람 등급: ALL / 12 / 15 / 19 -->
      <div class="admin-form-group">
        <label for="rating" class="admin-form-label admin-form-label--required">관람 등급</label>
        <select id="rating" name="rating" class="input" required>
          <option value="ALL"
                  th:selected="${movie?.rating == 'ALL'}">전체관람가</option>
          <option value="12"
                  th:selected="${movie?.rating == '12'}">12세 이상</option>
          <option value="15"
                  th:selected="${movie?.rating == '15'}">15세 이상</option>
          <option value="19"
                  th:selected="${movie?.rating == '19'}">청소년 관람불가</option>
        </select>
      </div>

      <div class="admin-form-group">
        <label for="runtime" class="admin-form-label admin-form-label--required">러닝타임 (분)</label>
        <input type="number" id="runtime" name="runtime" class="input"
               placeholder="예: 120"
               min="1"
               th:value="${movie?.runtime}"
               required>
      </div>

      <div class="admin-form-group">
        <label for="director" class="admin-form-label admin-form-label--required">감독</label>
        <input type="text" id="director" name="director" class="input"
               placeholder="감독 이름"
               th:value="${movie?.director}"
               required>
      </div>

      <div class="admin-form-group">
        <label for="actor" class="admin-form-label">주연 배우</label>
        <input type="text" id="actor" name="actor" class="input"
               placeholder="쉼표로 구분 (예: 배우1, 배우2)"
               th:value="${movie?.actor}">
      </div>

      <div class="admin-form-group">
        <label for="description" class="admin-form-label">줄거리</label>
        <textarea id="description" name="description" class="input"
                  rows="5"
                  placeholder="영화 줄거리를 입력하세요"
                  th:text="${movie?.description}"></textarea>
      </div>

      <!-- ── 상영 기간 ───────────────────────── -->
      <div class="admin-form-group">
        <label for="startAt" class="admin-form-label admin-form-label--required">상영 시작일</label>
        <input type="date" id="startAt" name="startAt" class="input"
               th:value="${movie?.startAt}"
               onchange="initDateValidation()"
               required>
      </div>

      <div class="admin-form-group">
        <label for="endAt" class="admin-form-label admin-form-label--required">상영 종료일</label>
        <input type="date" id="endAt" name="endAt" class="input"
               th:value="${movie?.endAt}"
               onchange="validateDates()"
               required>
      </div>

      <!-- ── 상영관 선택 ─────────────────────── -->
      <div class="admin-form-group">
        <label for="theaterNo" class="admin-form-label admin-form-label--required">상영관</label>
        <select id="theaterNo" name="theaterNo" class="input" required>
          <option value="" disabled selected>상영관을 선택하세요</option>
          <option th:each="theater : ${theaters}"
                  th:value="${theater.no}"
                  th:text="${theater.no + '관 — ' + theater.name}"
                  th:attr="data-cleanup=${theater.cleanupTime}">
            상영관명
          </option>
        </select>
        <!-- 정리 시간 안내: 선택 상영관의 cleanupTime 표시 -->
        <p class="admin-form-hint" id="cleanupHint"></p>
      </div>

      <!-- ── 폼 액션 버튼 ────────────────────── -->
      <div class="admin-form-actions">
        <a th:href="@{/admin/management/movie/manage}"
           class="btn btn--ghost">
          취소
        </a>
        <button type="button" class="btn btn--primary"
                onclick="submitMovieForm()">
          <!-- 등록/수정 버튼 텍스트 동적 표시 -->
          <span th:text="${movie != null} ? '수정 완료' : '등록'">저장</span>
        </button>
      </div>

    </form>
  </div>

  <!-- 페이지 전용 JS -->
  <script th:src="@{/js/admin/movie-form.js}"></script>
  <script>
    /* 페이지 진입 시 초기화 */
    document.addEventListener('DOMContentLoaded', function () {
      initDateValidation(); /* 날짜 유효성 초기 설정 */
      checkUrlError();      /* URL ?error= 파라미터 에러 메시지 처리 */

      /* 상영관 선택 시 정리 시간 힌트 표시 */
      const theaterSelect = document.getElementById('theaterNo');
      const cleanupHint   = document.getElementById('cleanupHint');

      theaterSelect.addEventListener('change', function () {
        const selected = this.options[this.selectedIndex];
        const cleanup  = selected.getAttribute('data-cleanup');
        cleanupHint.textContent = cleanup
          ? '정리 시간: ' + cleanup + '분 (스케줄 자동 반영)'
          : '';
      });
    });
  </script>

</main>
</body>
</html>
