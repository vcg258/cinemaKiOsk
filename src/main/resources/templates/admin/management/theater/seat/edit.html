<!DOCTYPE html>
<!--
  templates/admin/management/theater/seat/edit.html
  ─────────────────────────────────────────────────────────────────────────
  좌석 정보 수정 (관리자용)
  ※ UC 명세 외 팀 합의로 추가된 페이지

  ▶ 기능 요약
    - 특정 상영관의 좌석 구성(행·열·유형) 수정
    - 좌석 정책(SeatPolicy) 기반으로 좌석별 요금·리클라이너 여부 관리

  ▶ Controller → View 전달 Model 속성
    - theater     : TheaterDTO            현재 상영관 정보
                    └ no, name
    - seatPolicies: List<SeatPolicyVO>    전체 좌석 정책 목록
                    └ policyId, name, cost, isRecliner(Boolean)
    - seats       : List<SeatStatusDTO>   현재 상영관 좌석 목록
                    └ seatId, row, col, policyId

  ▶ 연결 페이지
    ← admin/management/theater/edit.html (상영관 정보 수정에서 진입)

  ▶ 파일 위치
    templates/admin/management/theater/seat/edit.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>좌석 정보 수정 | CineOS 관리자</title>
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       TODO: 좌석 정보 수정 구현
       ─────────────────────────────────────────────────────────────────
       구현 항목:
         [ ] 상영관 정보 헤더 표시
               th:text="${theater.no} + '관 - ' + ${theater.name}"
         [ ] 좌석 정책 목록 (SeatPolicy)
               th:each="policy : ${seatPolicies}"
               policyId / name / cost / isRecliner 표시·수정 가능
         [ ] 좌석 배치 그리드
               행·열별 좌석 표시
               th:each="seat : ${seats}"
               각 좌석에 적용된 policyId 선택 드롭다운
         [ ] '저장' 버튼 → PUT /api/admin/theater/{no}/seats
         [ ] '취소' 버튼 → admin/management/theater/edit 로 복귀
  ══════════════════════════════════════════════════════════════════ -->

  <div class="admin-placeholder">
    <p>좌석 정보 수정 — 구현 예정</p>
  </div>

  <!-- 좌석 편집 전용 JS (theater.js 재사용 또는 별도 분리 검토) -->
  <script th:src="@{/js/admin/theater.js}" th:if="${false}"></script>

</main>
</body>
</html>
