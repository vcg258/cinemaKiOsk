<!DOCTYPE html>
<!--
  templates/admin/management/theater/list.html
  ─────────────────────────────────────────────────────────────────────────
  상영관 목록 (관리자용 진입점)
  UC-21 관련 작업의 시작 화면

  ▶ 기능 요약
    - 등록된 전체 상영관 목록 표시
    - 각 항목에 '수정' 버튼 → UC-21 상영관 정보 수정 폼 이동

  ▶ Controller → View 전달 Model 속성
    - theaters : List<TheaterDTO>  전체 상영관 목록
                 └ no, seatPolicy(SeatPolicyDTO), cleanupTime

  ▶ 파일 위치
    templates/admin/management/theater/list.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>상영관 목록 | CineOS 관리자</title>
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       페이지 헤더
  ══════════════════════════════════════════════════════════════════ -->
  <div class="admin-page-header">
    <div>
      <h1 class="admin-page-title">상영관 목록</h1>
      <p class="admin-page-subtitle">등록된 상영관 정보를 조회하고 수정합니다.</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════
       TODO: 상영관 목록 테이블 구현
       ─────────────────────────────────────────────────────────────────
       구현 항목:
         [ ] 상영관 목록 테이블
               th:each="theater : ${theaters}"
               컬럼: 상영관 번호 / 좌석 정책명 / 좌석 요금 / 정리 시간(분) / 수정
         [ ] '수정' 버튼 → th:href="@{/admin/management/theater/edit(no=${theater.no})}"
         [ ] 상영관이 없을 경우 빈 상태 메시지 표시
               th:if="${#lists.isEmpty(theaters)}"
         [ ] 비고: 진행 중 예매가 있을 경우 수정 시 변동 안내 → edit.html에서 처리
  ══════════════════════════════════════════════════════════════════ -->
  <div class="admin-table-wrap">
    <table class="admin-data-table">
      <thead>
        <tr>
          <th>상영관 번호</th>
          <th>좌석 정책</th>
          <th>좌석 요금</th>
          <th>정리 시간</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody>

        <!-- 데이터 없을 때 안내 행 -->
        <tr th:if="${theaters == null or #lists.isEmpty(theaters)}">
          <td colspan="5" style="text-align:center; padding: 3rem; color: var(--text-muted);">
            등록된 상영관이 없습니다.
          </td>
        </tr>

        <!-- TODO: 상영관 목록 행 반복 -->
        <!--
        <tr th:each="theater : ${theaters}">
          <td th:text="${theater.no + '관'}">-</td>
          <td th:text="${theater.seatPolicy != null ? theater.seatPolicy.name : '-'}">-</td>
          <td th:text="${theater.seatPolicy != null ? #numbers.formatInteger(theater.seatPolicy.cost, 1, 'COMMA') + '원' : '-'}">-</td>
          <td th:text="${theater.cleanupTime + '분'}">-</td>
          <td class="admin-data-table__actions">
            <a th:href="@{/admin/management/theater/edit(no=${theater.no})}"
               class="btn btn--sm btn--ghost">수정</a>
          </td>
        </tr>
        -->

      </tbody>
    </table>
  </div>

</main>
</body>
</html>
