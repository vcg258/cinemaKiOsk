<!DOCTYPE html>
<!--
  templates/admin/management/theater/edit.html
  UC-21: 상영관 정보 수정
  Model: theaters(List<TheaterVO>), theater(TheaterVO),
         seatPolicies(List<SeatPolicyVO>), hasActiveReservation(Boolean)
  TheaterVO   : no, policyId, cleanupTime   ← name 필드 없음 (DB theater 테이블에 컬럼 없음)
  SeatPolicyVO: policyId, name, cost        ← isRecliner 없음
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>상영관 관리 | CineOS 관리자</title>
</head>

<body>
<main>

  <!-- 페이지 헤더 -->
  <div class="admin-page-header">
    <h1 class="admin-page-header__title">상영관 관리</h1>
    <p class="admin-page-header__subtitle">상영관 정보 및 좌석 구성을 수정합니다.</p>
  </div>

  <!-- 진행 중 예매 존재 시 안내 배너 (명세 기준) -->
  <div class="admin-warning-banner"
       th:if="${hasActiveReservation}"
       role="alert">
    현재 진행 중인 예매가 있습니다. 수정 내용은 기존 예매에 영향을 줄 수 있습니다.
  </div>

  <!-- 상영관 선택 드롭다운 -->
  <div class="admin-form-card">
    <div class="admin-form-group">
      <label for="theaterSelect" class="admin-form-label">상영관 선택</label>
      <select id="theaterSelect" class="input"
              onchange="loadTheaterInfo(this.value)">
        <!--
          theater.name 없음 (DB 컬럼 없음) → no + '관' 형식으로 표시
          상영관 이름이 필요하면 seat_policy.name 으로 보완 가능
        -->
        <option th:each="t : ${theaters}"
                th:value="${t.no}"
                th:text="${t.no + '관'}"
                th:selected="${t.no == theater?.no}">
          상영관
        </option>
      </select>
    </div>
  </div>

  <!-- 상영관 수정 폼 -->
  <div class="admin-form-card">
    <form id="theaterForm" autocomplete="off">

      <input type="hidden" id="theaterNo" th:value="${theater?.no}">

      <!-- 정리 시간 -->
      <div class="admin-form-group">
        <label for="cleanupTime" class="admin-form-label admin-form-label--required">
          정리 시간 (분)
        </label>
        <input type="number" id="cleanupTime" name="cleanupTime"
               class="input"
               min="0" max="60"
               placeholder="예: 20"
               th:value="${theater?.cleanupTime}"
               onchange="validateCleanupTime()">
        <p class="admin-form-hint">
          상영 종료 후 다음 스케줄까지의 정리 시간 (분 단위)
        </p>
      </div>

      <!-- 좌석 정책 목록 -->
      <div class="admin-form-group">
        <label class="admin-form-label">좌석 구성 및 요금</label>

        <div class="admin-table-wrap">
          <table class="admin-data-table">
            <thead>
              <tr>
                <th>정책명</th>
                <th>요금 (원)</th>
                <th>좌석 편집</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="policy : ${seatPolicies}">
                <td th:text="${policy.name}">정책명</td>
                <td>
                  <!-- 요금 인라인 수정 인풋 -->
                  <input type="number"
                         class="input input--sm policy-cost-input"
                         th:value="${policy.cost}"
                         th:attr="data-policy-id=${policy.policyId}"
                         min="0"
                         onchange="validateCost(this)">
                </td>
                <td>
                  <!-- 해당 정책의 좌석 편집 → seat/edit.html -->
                  <a th:href="@{/admin/management/seat/edit(policyId=${policy.policyId})}"
                     class="btn btn--ghost btn--sm">
                    좌석 편집
                  </a>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(seatPolicies)}">
                <td colspan="3" class="admin-data-table__empty">
                  등록된 좌석 정책이 없습니다.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 폼 액션 -->
      <div class="admin-form-actions">
        <button type="button" class="btn btn--ghost"
                onclick="loadTheaterInfo(document.getElementById('theaterNo').value)">
          초기화
        </button>
        <button type="button" class="btn btn--primary"
                onclick="submitTheaterForm()">
          저장
        </button>
      </div>

    </form>
  </div>

  <!-- 페이지 전용 JS -->
  <script th:src="@{/js/admin/theater.js}"></script>

</main>
</body>
</html>
