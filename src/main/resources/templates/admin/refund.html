<!DOCTYPE html>
<!--
  templates/admin/refund.html
  ─────────────────────────────────────────────────────────────────────────
  UC-17: 환불 처리 (관리자용)

  ▶ 기능 요약
    - 예매번호 또는 휴대폰 번호로 예매 내역 조회
    - 조회 결과: 영화명·날짜·시간·좌석·결제금액·사용 할인 수단 표시
    - 환불 가능 여부 확인 (영화 시작 후 10분 이내)
    - '환불 처리' 버튼 클릭 → 환불 처리

  ▶ Controller → View 전달 Model 속성
    - reservation   : ReservationDetailsDTO  조회된 예매 내역 (검색 전: null)
    - payment       : PaymentDetailsDTO      결제 내역
    - movie         : MovieDTO               영화 정보
    - schedule      : ScheduleDTO            상영 스케줄
    - isRefundable  : Boolean                환불 가능 여부 (10분 이내 = true)

  ▶ 에러 메시지 (명세 기준 — 임의 변경 금지)
    - 10분 경과:    "환불 가능 시간이 초과되었습니다."
    - 이미 환불됨: "이미 환불 처리된 예매입니다."
    - 조회 없음:   "해당 예매를 찾을 수 없습니다."
    - 환불 실패:   "환불 처리에 실패하였습니다. 다시 시도해 주세요."

  ▶ 파일 위치
    templates/admin/refund.html
  ─────────────────────────────────────────────────────────────────────────
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout(~{::title}, ~{::main})}">

<head>
  <title>환불 처리 | CineOS 관리자</title>
</head>

<body>
<main>

  <!-- ══════════════════════════════════════════════════════════════════
       TODO: UC-17 환불 처리 콘텐츠 구현
       ─────────────────────────────────────────────────────────────────
       구현 항목:
         [ ] 조회 폼 (예매번호 입력 또는 휴대폰 번호 입력 탭)
               → GET /api/admin/refund?reservationId={id}
               → GET /api/admin/refund?phone={phone}
         [ ] 조회 결과 영역 (결과 없을 때 숨김)
               영화명 / 날짜 / 시간 / 좌석 / 결제금액 / 사용 할인 수단
         [ ] 환불 가능 여부 표시
               isRefundable=true  → '환불 처리' 버튼 활성화
               isRefundable=false → "환불 가능 시간이 초과되었습니다." 메시지
         [ ] '환불 처리' 버튼 → POST /api/admin/refund/{reservationId}
               성공: 환불 완료 안내
               실패: 에러 메시지 표시
  ══════════════════════════════════════════════════════════════════ -->
  <div class="admin-placeholder">
    <p>UC-17 환불 처리 — 구현 예정</p>
  </div>

  <script th:src="@{/js/admin/refund.js}" th:if="${false}"></script>

</main>
</body>
</html>
